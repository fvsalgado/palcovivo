<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff-body);background:var(--surface-bg);color:var(--text-primary);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background var(--transition-base),color var(--transition-base)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.skip-link{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip-link:focus{position:fixed;left:16px;top:16px;width:auto;height:auto;background:var(--color-primary);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-size:var(--text-sm);font-weight:600;z-index:9999;text-decoration:none}
nav{position:fixed;top:0;left:0;right:0;z-index:var(--z-nav);height:var(--nav-h);padding:0 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,247,242,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(185,28,28,.1);transition:background var(--transition-base)}
[data-theme="dark"] nav{background:rgba(13,10,7,.94);border-bottom-color:rgba(192,139,47,.18)}
.nav-brand{display:flex;align-items:center;gap:0;text-decoration:none}
.nav-logo{display:inline-flex;align-items:center;background:var(--color-primary);border-radius:var(--radius-sm);padding:4px 9px;line-height:1}
.nav-logo-word{font-family:var(--ff-display);font-size:15px;font-weight:900;color:#fff;letter-spacing:-.02em}
.nav-brand-vivo{font-family:var(--ff-display);font-size:20px;font-weight:700;font-style:italic;color:var(--color-primary);letter-spacing:-.01em;margin-left:6px}
.nav-right{display:flex;align-items:center;gap:6px}
.nav-links{display:flex;align-items:center;gap:2px;list-style:none}
.nav-links a{display:block;padding:7px 14px;font-size:var(--text-sm);font-weight:500;color:var(--text-secondary);text-decoration:none;border-radius:var(--radius-sm);transition:color var(--transition-fast),background var(--transition-fast)}
.nav-links a:hover{color:var(--color-primary);background:var(--color-primary-light)}
[data-theme="dark"] .nav-links a{color:var(--text-muted)}
[data-theme="dark"] .nav-links a:hover{color:var(--color-accent);background:var(--color-accent-light)}
.nav-links a:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.theme-btn{width:36px;height:36px;min-width:44px;min-height:44px;border:1px solid rgba(0,0,0,.12);background:var(--surface-bg-2);border-radius:var(--radius-full);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background var(--transition-fast);flex-shrink:0}
[data-theme="dark"] .theme-btn{border-color:rgba(255,255,255,.1);background:var(--surface-card)}
.theme-btn:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.theme-btn .i-sun{display:none}.theme-btn .i-moon{display:block}
[data-theme="dark"] .theme-btn .i-sun{display:block}[data-theme="dark"] .theme-btn .i-moon{display:none}
.nav-toggle{display:none;background:none;border:none;cursor:pointer;font-size:22px;padding:8px;color:var(--text-secondary);border-radius:var(--radius-sm);min-width:44px;min-height:44px;align-items:center;justify-content:center}
/* Theater Hero */
.theater-hero{padding:90px 48px 52px;position:relative;overflow:hidden;border-bottom:1px solid var(--surface-card-border)}
.th-bg-glow{position:absolute;top:-40%;left:-10%;width:70%;height:200%;border-radius:50%;background:var(--tc,var(--color-primary));opacity:.05;filter:blur(80px);pointer-events:none}
[data-theme="dark"] .th-bg-glow{opacity:.08}
.th-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.back-link{display:inline-flex;align-items:center;gap:8px;font-size:var(--text-sm);font-weight:500;color:var(--text-muted);text-decoration:none;margin-bottom:32px;padding:7px 14px;border:1px solid var(--surface-card-border);border-radius:var(--radius-sm);transition:color var(--transition-fast),border-color var(--transition-fast)}
.back-link:hover{color:var(--color-accent);border-color:rgba(192,139,47,.4)}
.back-link:focus-visible{outline:2px solid var(--color-accent);outline-offset:2px}
.th-meta-top{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.th-color-dot{width:12px;height:12px;border-radius:50%;background:var(--tc,var(--color-primary));flex-shrink:0}
.th-city-label{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted)}
.th-name{font-family:var(--ff-display);font-size:clamp(36px,5vw,72px);font-weight:900;color:var(--text-primary);line-height:.92;letter-spacing:-.03em;margin-bottom:20px}
.th-desc{font-size:var(--text-base);color:var(--text-secondary);line-height:1.8;max-width:640px;margin-bottom:32px}
.th-links{display:flex;flex-wrap:wrap;gap:10px}
.th-link-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border:1px solid var(--surface-card-border);border-radius:var(--radius-sm);font-size:var(--text-sm);font-weight:500;color:var(--text-primary);text-decoration:none;transition:border-color var(--transition-fast),color var(--transition-fast)}
.th-link-btn:hover{border-color:var(--color-accent);color:var(--color-accent)}
.th-link-btn:focus-visible{outline:2px solid var(--color-accent);outline-offset:2px}
/* Info grid */
.th-info-section{padding:52px 48px 80px;max-width:1200px;margin:0 auto}
.th-info-grid{display:grid;grid-template-columns:1fr 300px;gap:48px;align-items:start}
/* Events list */
.th-events-title{font-family:var(--ff-display);font-size:28px;font-weight:700;color:var(--text-primary);margin-bottom:28px;letter-spacing:-.02em}
.ev-list{display:flex;flex-direction:column;gap:12px}
.ev-item{display:flex;gap:16px;padding:16px;background:var(--surface-card);border:1px solid var(--surface-card-border);border-radius:var(--radius-md);text-decoration:none;color:var(--text-primary);transition:border-color var(--transition-fast),box-shadow var(--transition-fast)}
.ev-item:hover,.ev-item:focus-visible{border-color:rgba(192,139,47,.4);box-shadow:var(--shadow-sm)}
.ev-item:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.ev-item-img{width:80px;height:60px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0;background:var(--surface-bg-2)}
.ev-item-body{flex:1;min-width:0}
.ev-item-title{font-family:var(--ff-display);font-size:var(--text-base);font-weight:700;color:var(--text-primary);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-item-dates{font-size:12px;color:var(--color-accent);font-weight:600;margin-bottom:4px}
.ev-item-source{font-size:11px;color:var(--color-primary);font-weight:500}
.ev-item-source:hover{text-decoration:underline}
/* Info sidebar */
.th-sidebar{background:var(--surface-card);border:1px solid var(--surface-card-border);border-radius:var(--radius-lg);padding:24px;position:sticky;top:80px}
.th-sidebar-title{font-family:var(--ff-display);font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:20px}
.th-info-row{display:flex;flex-direction:column;gap:4px;padding:12px 0;border-bottom:1px solid var(--surface-card-border)}
.th-info-row:last-child{border-bottom:none;padding-bottom:0}
.th-info-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted)}
.th-info-value{font-size:var(--text-sm);color:var(--text-primary)}
.th-info-value a{color:var(--color-primary);text-decoration:none;font-weight:500}
.th-info-value a:hover{text-decoration:underline}
/* Loading/empty */
.loading-state{padding:60px;text-align:center;color:var(--text-muted)}
.spinner{width:28px;height:28px;border:2px solid var(--surface-card-border);border-top-color:var(--color-accent);border-radius:50%;margin:0 auto 16px}
@media(prefers-reduced-motion:no-preference){.spinner{animation:spin .7s linear infinite}}
@keyframes spin{to{transform:rotate(360deg)}}
footer{background:var(--surface-bg-2);color:var(--text-muted);border-top:1px solid var(--surface-card-border);padding:32px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-brand{font-family:var(--ff-display);font-size:20px;font-weight:700;color:var(--text-primary)}
.footer-brand em{font-style:italic;color:var(--color-primary)}
.footer-links{display:flex;gap:4px;list-style:none;flex-wrap:wrap}
.footer-links a{font-size:var(--text-sm);color:var(--text-muted);text-decoration:none;padding:4px 8px;border-radius:var(--radius-sm);transition:color var(--transition-fast)}
.footer-links a:hover{color:var(--color-accent)}
.footer-links a:focus-visible{outline:2px solid var(--color-accent);border-radius:var(--radius-sm)}
.footer-legal{width:100%;font-size:11px;opacity:.55;letter-spacing:.04em}
@media(max-width:900px){.th-info-grid{grid-template-columns:1fr}.th-sidebar{position:static}}
@media(max-width:768px){nav,footer{padding-left:20px;padding-right:20px}.theater-hero,.th-info-section{padding-left:20px;padding-right:20px}.nav-toggle{display:flex}.nav-links{display:none}.nav-links.open{display:flex;flex-direction:column;position:fixed;top:var(--nav-h);left:0;right:0;padding:12px;background:var(--surface-bg);border-bottom:1px solid var(--surface-card-border);gap:2px;z-index:199}[data-theme="dark"] .nav-links.open{background:var(--surface-bg-2)}.nav-links.open a{padding:13px 16px;border-bottom:1px solid var(--surface-card-border)}}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Saltar para o conteúdo principal</a>
<nav role="navigation" aria-label="Navegação principal">
  <a class="nav-brand" href="index.html" aria-label="Palco Vivo — página inicial">
    <span class="nav-logo" aria-hidden="true"><span class="nav-logo-word">Palco</span></span>
    <span class="nav-brand-vivo">Vivo</span>
  </a>
  <div class="nav-right">
    <ul class="nav-links" id="nav-menu" role="list">
      <li><a href="programacao.html">Programação</a></li>
      <li><a href="calendario.html">Agenda</a></li>
      <li><a href="palco-viivo.html">Palco Viivo</a></li>
      <li><a href="teatros.html" aria-current="page">Teatros</a></li>
      <li><a href="sobre.html">Sobre</a></li>
    </ul>
    <button class="theme-btn" id="theme-btn" aria-label="Ativar modo escuro" aria-pressed="false">
      <span class="i-moon" aria-hidden="true">🌙</span>
      <span class="i-sun" aria-hidden="true">☀️</span>
    </button>
    <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="nav-menu" onclick="toggleMenu(this)">☰</button>
  </div>
</nav>
<main id="main-content">
  <div id="theater-hero-wrap"></div>
  <div class="th-info-section">
    <div class="th-info-grid">
      <div>
        <h2 class="th-events-title">Programação atual</h2>
        <div class="ev-list" id="ev-list">
          <div class="loading-state"><div class="spinner" aria-hidden="true"></div><p style="font-size:var(--text-sm)">A carregar…</p></div>
        </div>
      </div>
      <aside id="th-sidebar-wrap"></aside>
    </div>
  </div>
</main>
<footer role="contentinfo">
  <div class="footer-brand">Palco <em>Vivo</em></div>
  <ul class="footer-links" role="list">
    <li><a href="programacao.html">Programação</a></li>
    <li><a href="calendario.html">Agenda</a></li>
    <li><a href="palco-viivo.html">Palco Viivo</a></li>
    <li><a href="teatros.html" aria-current="page">Teatros</a></li>
    <li><a href="sobre.html">Sobre</a></li>
    <li><a href="privacidade.html">Privacidade</a></li>
    <li><a href="aviso-legal.html">Aviso Legal</a></li>
    <li><a href="acessibilidade.html">Acessibilidade</a></li>
  </ul>
  <p class="footer-legal">© <span id="year"></span> Palco Vivo · Portugal</p>
</footer>
<script>
document.getElementById("year").textContent=new Date().getFullYear();
(function(){var btn=document.getElementById("theme-btn");function ap(t){document.documentElement.setAttribute("data-theme",t);var d=t==="dark";btn.setAttribute("aria-label",d?"Ativar modo claro":"Ativar modo escuro");btn.setAttribute("aria-pressed",String(d));}ap(document.documentElement.getAttribute("data-theme")||"light");btn.addEventListener("click",function(){var n=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";localStorage.setItem("pv-theme",n);ap(n);});})();
function trapFocus(c,t){var f=c.querySelectorAll('a,button,[tabindex]:not([tabindex="-1"])');var fi=f[0],la=f[f.length-1];function h(e){if(e.key==="Tab"){if(e.shiftKey){if(document.activeElement===fi){e.preventDefault();la.focus();}}else{if(document.activeElement===la){e.preventDefault();fi.focus();}}}if(e.key==="Escape")closeMenu(t);}c._th=h;document.addEventListener("keydown",h);if(fi)fi.focus();}
function releaseFocus(c){if(c._th){document.removeEventListener("keydown",c._th);delete c._th;}}
function closeMenu(btn){var m=document.getElementById("nav-menu");m.classList.remove("open");btn.setAttribute("aria-expanded","false");btn.setAttribute("aria-label","Abrir menu");btn.textContent="☰";releaseFocus(m);btn.focus();}
function toggleMenu(btn){var m=document.getElementById("nav-menu");var o=m.classList.toggle("open");btn.setAttribute("aria-expanded",o);btn.setAttribute("aria-label",o?"Fechar menu":"Abrir menu");btn.textContent=o?"✕":"☰";if(o)trapFocus(m,btn);else releaseFocus(m);}
document.addEventListener("click",function(e){var m=document.getElementById("nav-menu"),b=document.querySelector(".nav-toggle");if(m&&m.classList.contains("open")&&!m.contains(e.target)&&b&&!b.contains(e.target))closeMenu(b);});
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
async function load(){
  const params=new URLSearchParams(location.search);
  const id=params.get("id");
  if(!id){window.location="teatros.html";return;}
  const ck=Math.floor(Date.now()/3_600_000);
  const [tR,eR]=await Promise.allSettled([
    fetch("theaters.json?v="+ck).then(r=>r.json()),
    fetch("events.json?v="+ck).then(r=>r.json()),
  ]);
  const theaters=tR.status==="fulfilled"?(tR.value.theaters||[]):[];
  const events=eR.status==="fulfilled"?(eR.value.events||[]):[];
  const theater=theaters.find(t=>t.id===id);
  if(!theater){document.getElementById("ev-list").innerHTML=`<div class="loading-state"><p>Teatro não encontrado.</p></div>`;return;}
  document.title=`${theater.name} — Palco Vivo`;
  document.documentElement.style.setProperty("--tc",theater.color||"var(--color-primary)");
  // Hero
  document.getElementById("theater-hero-wrap").innerHTML=`
  <div class="theater-hero">
    <div class="th-bg-glow" aria-hidden="true"></div>
    <div class="th-inner">
      <a class="back-link" href="teatros.html">← Todos os teatros</a>
      <div class="th-meta-top">
        <div class="th-color-dot" aria-hidden="true"></div>
        <span class="th-city-label">${esc(theater.city||"Lisboa")}</span>
      </div>
      <h1 class="th-name">${esc(theater.name)}</h1>
      ${theater.description?`<p class="th-desc">${esc(theater.description)}</p>`:""}
      <div class="th-links">
        ${theater.site?`<a class="th-link-btn" href="${esc(theater.site)}" target="_blank" rel="noopener noreferrer">🌐 Site oficial ↗</a>`:""}
        ${theater.programacao?`<a class="th-link-btn" href="${esc(theater.programacao)}" target="_blank" rel="noopener noreferrer">📅 Programação ↗</a>`:""}
      </div>
    </div>
  </div>`;
  // Sidebar
  document.getElementById("th-sidebar-wrap").innerHTML=`
  <aside class="th-sidebar">
    <div class="th-sidebar-title">Informação</div>
    ${theater.address?`<div class="th-info-row"><span class="th-info-label">Morada</span><span class="th-info-value">${esc(theater.address)}</span></div>`:""}
    ${theater.city?`<div class="th-info-row"><span class="th-info-label">Cidade</span><span class="th-info-value">${esc(theater.city)}</span></div>`:""}
    ${theater.site?`<div class="th-info-row"><span class="th-info-label">Website</span><span class="th-info-value"><a href="${esc(theater.site)}" target="_blank" rel="noopener noreferrer">${esc(theater.site.replace(/^https?:\/\//,""))}</a></span></div>`:""}
    ${(theater.salas||[]).length?`<div class="th-info-row"><span class="th-info-label">Salas</span><span class="th-info-value">${theater.salas.map(s=>esc(s)).join(" · ")}</span></div>`:""}
  </aside>`;
  // Events
  const today=new Date();today.setHours(0,0,0,0);
  const thEvs=events.filter(e=>(e.theater===theater.theater_key||e.source_theater===theater.theater_key)&&(!e.date_start||(new Date(e.date_start+"T00:00:00"))>=today)).sort((a,b)=>new Date(a.date_start||0)-new Date(b.date_start||0));
  const list=document.getElementById("ev-list");
  if(!thEvs.length){list.innerHTML=`<div class="loading-state"><p>Sem espetáculos disponíveis de momento.</p></div>`;return;}
  list.innerHTML=thEvs.map(ev=>{
    const imgObj=ev.image&&typeof ev.image==="object"?ev.image:null;
    const imgUrl=imgObj?imgObj.url:(ev.image||"");
    const sourceUrl=ev.source_url||ev.url||"";
    return`<div class="ev-item" role="article">
      ${imgUrl?`<img class="ev-item-img" src="${esc(imgUrl)}" alt="Imagem do espetáculo ${esc(ev.title)}, ${esc(theater.name)}" loading="lazy" onerror="this.style.display='none'"/>`:""}
      <div class="ev-item-body">
        <div class="ev-item-title">${esc(ev.title||"")}</div>
        <div class="ev-item-dates">${esc(ev.dates_label||(ev.date_start||""))}</div>
        ${sourceUrl?`<a class="ev-item-source" href="${esc(sourceUrl)}" target="_blank" rel="noopener noreferrer">Ver no site do teatro →</a>`:""}
      </div>
    </div>`;
  }).join("");
}
load();
</script>
</body>
</html>
