<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Teatro — Palco Vivo</title>
<meta name="description" content="Programação e informação do teatro."/>
<meta name="theme-color" content="#0D0A07"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#B91C1C;--gold:#C9963A;
  --cream:#FAF7F2;--ink:#1A1209;
  --dark:#0D0A07;--dark2:#1A1410;--dark3:#261E16;
  --dark-text:#F0E8DC;--dark-text2:#A89880;
  --dark-border:rgba(201,150,58,.2);
  --tc:#B91C1C; /* theater color, overridden by JS */
  --ff-d:'Playfair Display',Georgia,serif;
  --ff-b:'Plus Jakarta Sans',system-ui,sans-serif;
  --radius:6px;
}
html{scroll-behavior:smooth}
body{font-family:var(--ff-b);background:var(--dark);color:var(--dark-text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.skip-link{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip-link:focus{position:fixed;left:16px;top:16px;width:auto;height:auto;background:var(--red);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:14px;font-weight:600;z-index:9999;text-decoration:none}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(13,10,7,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--dark-border)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-brand-mark{width:34px;height:34px;background:var(--red);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-size:18px;font-weight:900;color:#fff}
.nav-brand-text{font-family:var(--ff-d);font-size:20px;font-weight:700;color:var(--dark-text);letter-spacing:-.01em}
.nav-brand-text em{font-style:italic;color:var(--red)}
.nav-links{display:flex;align-items:center;gap:2px;list-style:none}
.nav-links a{display:block;padding:7px 14px;font-size:13px;font-weight:500;color:var(--dark-text2);text-decoration:none;border-radius:var(--radius);transition:color .2s,background .2s}
.nav-links a:hover{color:var(--gold);background:rgba(201,150,58,.1)}
.nav-links a.active{color:var(--gold)}
.nav-links a:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.nav-toggle{display:none;background:none;border:none;cursor:pointer;font-size:22px;padding:8px;color:var(--dark-text2);border-radius:var(--radius)}

/* HERO BAND */
.theater-hero{
  padding:90px 48px 52px;
  position:relative;overflow:hidden;
  border-bottom:1px solid var(--dark-border);
}
.th-bg-glow{position:absolute;top:-40%;left:-10%;width:70%;height:200%;border-radius:50%;background:var(--tc);opacity:.05;filter:blur(80px);pointer-events:none}
.th-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.back-link{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--dark-text2);text-decoration:none;margin-bottom:32px;padding:7px 14px;border:1px solid var(--dark-border);border-radius:var(--radius);transition:color .2s,border-color .2s}
.back-link:hover{color:var(--gold);border-color:rgba(201,150,58,.4)}
.back-link:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.th-color-bar{width:48px;height:4px;border-radius:2px;background:var(--tc);margin-bottom:20px}
.th-name{font-family:var(--ff-d);font-size:clamp(36px,6vw,80px);font-weight:900;color:var(--dark-text);line-height:.9;letter-spacing:-.04em;margin-bottom:20px}
.th-desc{font-size:15px;color:var(--dark-text2);line-height:1.8;max-width:620px;margin-bottom:28px}
.th-meta{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:28px}
.th-meta-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dark-text2)}
.th-meta-item a{color:var(--dark-text2);text-decoration:none;transition:color .2s}
.th-meta-item a:hover{color:var(--gold)}
.th-actions{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.btn-tc{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:transparent;color:var(--tc);border:2px solid var(--tc);font-family:var(--ff-b);font-size:13px;font-weight:600;text-decoration:none;border-radius:var(--radius);transition:background .2s,color .2s}
.btn-tc:hover{background:var(--tc);color:#fff}
.btn-tc:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:transparent;color:var(--dark-text2);border:2px solid var(--dark-border);font-family:var(--ff-b);font-size:13px;font-weight:500;text-decoration:none;border-radius:var(--radius);transition:border-color .2s,color .2s}
.btn-ghost:hover{border-color:rgba(201,150,58,.4);color:var(--dark-text)}
.btn-ghost:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
.th-salas{display:flex;flex-wrap:wrap;gap:8px}
.sala-tag{padding:5px 14px;border:1px solid var(--dark-border);border-radius:20px;font-size:12px;font-weight:500;color:var(--dark-text2)}

/* PROGRAMAÇÃO */
.prog-section{padding:48px 48px 80px;max-width:1200px;margin:0 auto}
.prog-h{display:flex;align-items:baseline;gap:12px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--dark-border)}
.prog-title{font-family:var(--ff-d);font-size:28px;font-weight:400;color:var(--dark-text)}
.prog-count{font-size:13px;color:var(--dark-text2)}
.ev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.ev-card{background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;position:relative}
.ev-card:hover,.ev-card:focus-visible{border-color:rgba(255,255,255,.18);transform:translateY(-3px)}
.ev-card:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.ev-card-accent{position:absolute;top:0;left:0;right:0;height:3px;background:var(--tc)}
.ev-img{width:100%;height:150px;object-fit:cover;display:block;background:var(--dark3);filter:brightness(.9);transition:filter .3s}
.ev-card:hover .ev-img{filter:brightness(1)}
.ev-placeholder{width:100%;height:150px;background:linear-gradient(135deg,var(--dark3),var(--dark2));display:flex;align-items:center;justify-content:center;font-size:36px}
.ev-body{padding:14px 16px 18px}
.ev-dates{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;color:var(--tc)}
.ev-title{font-family:var(--ff-d);font-size:18px;font-weight:700;color:var(--dark-text);line-height:1.25;margin-bottom:6px}
.ev-cat{font-size:12px;color:var(--dark-text2)}
.ev-price{font-size:12px;color:var(--dark-text2);margin-top:8px}

/* POPUP */
.popup-backdrop{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);animation:fadeIn .2s ease}
.popup-backdrop.hidden{display:none}
.popup{position:fixed;z-index:600;background:var(--dark2);border:1px solid var(--dark-border);border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,.7);width:min(400px,95vw);overflow:hidden;animation:slideUp .2s ease}
.popup-hero-img{height:180px;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-start;justify-content:flex-end;padding:10px}
.popup-close{width:32px;height:32px;border:none;background:rgba(0,0,0,.5);color:#fff;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.popup-close:hover{background:rgba(0,0,0,.8)}
.popup-close:focus-visible{outline:2px solid var(--gold)}
.popup-body{padding:18px 22px 22px}
.popup-theater{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px}
.popup-title{font-family:var(--ff-d);font-size:22px;font-weight:700;color:var(--dark-text);line-height:1.2;margin-bottom:14px}
.popup-row{display:flex;gap:10px;font-size:13px;color:var(--dark-text2);margin-bottom:8px;align-items:flex-start}
.popup-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.popup-desc{font-size:13px;color:var(--dark-text2);line-height:1.65;border-top:1px solid var(--dark-border);padding-top:14px;margin-top:6px}
.popup-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.pbtn-p{padding:9px 20px;background:var(--tc);color:#fff;border:none;border-radius:var(--radius);font-family:var(--ff-b);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:opacity .2s}
.pbtn-p:hover{opacity:.85}
.pbtn-p:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
.pbtn-s{padding:9px 16px;background:transparent;color:var(--dark-text2);border:1px solid var(--dark-border);border-radius:var(--radius);font-family:var(--ff-b);font-size:13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:border-color .2s,color .2s}
.pbtn-s:hover{border-color:rgba(201,150,58,.4);color:var(--dark-text)}

.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;color:var(--dark-text2)}
.spinner{width:28px;height:28px;border:2px solid var(--dark-border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
.empty-prog{color:var(--dark-text2);font-size:14px;padding:32px 0}

footer{background:var(--dark);color:var(--dark-text2);border-top:1px solid var(--dark-border);padding:32px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-brand{font-family:var(--ff-d);font-size:20px;font-weight:700;color:var(--dark-text)}
.footer-brand em{font-style:italic;color:var(--red)}
.footer-links{display:flex;gap:20px;list-style:none}
.footer-links a{font-size:13px;color:var(--dark-text2);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--gold)}
.footer-links a:focus-visible{outline:2px solid var(--gold);border-radius:2px}
.footer-legal{width:100%;font-size:11px;opacity:.45;letter-spacing:.04em}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  nav,footer{padding-left:20px;padding-right:20px}
  .theater-hero,.prog-section{padding-left:20px;padding-right:20px}
  .theater-hero{padding-top:84px}
  .nav-toggle{display:flex}
  .nav-links{display:none}
  .nav-links.open{display:flex;flex-direction:column;position:fixed;top:60px;left:0;right:0;padding:12px;background:var(--dark);border-bottom:1px solid var(--dark-border);gap:2px}
  .nav-links.open a{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Saltar para o conteúdo principal</a>

<nav role="navigation" aria-label="Navegação principal">
  <a class="nav-brand" href="index.html" aria-label="Palco Vivo — página inicial">
    <div class="nav-brand-mark" aria-hidden="true">P</div>
    <span class="nav-brand-text">Palco <em>Vivo</em></span>
  </a>
  <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="nav-menu" onclick="toggleMenu(this)">☰</button>
  <ul class="nav-links" id="nav-menu" role="list">
    <li><a href="calendario.html">Agenda</a></li>
    <li><a href="palco-viivo.html">Palco Viivo</a></li>
    <li><a href="teatros.html" class="active">Teatros</a></li>
    <li><a href="sobre.html">Sobre</a></li>
  </ul>
</nav>

<main id="main-content">
  <div id="page-content">
    <div class="loading-state" style="min-height:80vh"><div class="spinner"></div><span>A carregar…</span></div>
  </div>
</main>

<!-- POPUP -->
<div class="popup-backdrop hidden" id="pb" onclick="closePopup()"></div>
<div class="popup" id="popup" style="display:none" role="dialog" aria-modal="true" aria-labelledby="p-title">
  <div class="popup-hero-img" id="p-hero"><button class="popup-close" onclick="closePopup()" aria-label="Fechar">✕</button></div>
  <div class="popup-body">
    <div class="popup-theater" id="p-theater"></div>
    <div class="popup-title" id="p-title"></div>
    <div class="popup-row"><span class="popup-icon" aria-hidden="true">📅</span><span id="p-dates"></span></div>
    <div class="popup-row" id="p-sr" style="display:none"><span class="popup-icon" aria-hidden="true">⏰</span><span id="p-sched"></span></div>
    <div class="popup-row" id="p-pr" style="display:none"><span class="popup-icon" aria-hidden="true">🎟</span><span id="p-price"></span></div>
    <div class="popup-desc" id="p-desc" style="display:none"></div>
    <div class="popup-actions" id="p-actions"></div>
  </div>
</div>

<footer role="contentinfo">
  <div class="footer-brand">Palco <em>Vivo</em></div>
  <ul class="footer-links" role="list">
    <li><a href="calendario.html">Agenda</a></li>
    <li><a href="palco-viivo.html">Palco Viivo</a></li>
    <li><a href="teatros.html">Teatros</a></li>
    <li><a href="sobre.html">Sobre</a></li>
  </ul>
  <p class="footer-legal">© <span id="year"></span> Palco Vivo · Portugal</p>
</footer>

<script>
document.getElementById("year").textContent=new Date().getFullYear();
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function toggleMenu(btn){const m=document.getElementById("nav-menu");const o=m.classList.toggle("open");btn.setAttribute("aria-expanded",o);btn.setAttribute("aria-label",o?"Fechar menu":"Abrir menu");btn.textContent=o?"✕":"☰"}
document.querySelectorAll("#nav-menu a").forEach(a=>a.addEventListener("click",()=>{const m=document.getElementById("nav-menu"),b=document.querySelector(".nav-toggle");m.classList.remove("open");b.setAttribute("aria-expanded","false");b.textContent="☰"}));

let EVENTS=[],TC="#B91C1C";

function openPopup(idx){
  const e=EVENTS[idx];if(!e)return;
  const hero=document.getElementById("p-hero");
  hero.style.backgroundColor=TC;
  hero.style.backgroundImage=e.image?`url('${e.image}')`:"none";
  document.getElementById("p-theater").textContent=e.theater||"";
  document.getElementById("p-theater").style.color=TC;
  document.getElementById("p-title").textContent=e.title;
  document.getElementById("p-dates").textContent=e.dates_label||e.date_start||"";
  const sr=(id,rowId,v)=>{const r=document.getElementById(rowId);if(v){document.getElementById(id).textContent=v;r.style.display="flex"}else r.style.display="none"};
  sr("p-sched","p-sr",e.schedule);sr("p-price","p-pr",e.price);
  const desc=document.getElementById("p-desc");
  if(e.description){desc.textContent=e.description;desc.style.display="block"}else desc.style.display="none";
  const ac=document.getElementById("p-actions");ac.innerHTML="";
  if(e.ticket_url)ac.innerHTML+=`<a class="pbtn-p" href="${e.ticket_url}" target="_blank" rel="noopener">Comprar bilhetes</a>`;
  if(e.url&&e.url!==e.ticket_url)ac.innerHTML+=`<a class="pbtn-s" href="${e.url}" target="_blank" rel="noopener">Mais info</a>`;
  document.getElementById("popup").style.display="block";
  document.getElementById("pb").classList.remove("hidden");
  document.body.style.overflow="hidden";
}
function closePopup(){document.getElementById("popup").style.display="none";document.getElementById("pb").classList.add("hidden");document.body.style.overflow=""}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePopup()});

function renderCards(evs,label,collapsed){
  if(!evs.length)return`<p class="empty-prog">Sem espetáculos ${label.toLowerCase()}.</p>`;
  return`<div class="ev-grid">`+evs.map((e,i)=>{
    const gi=EVENTS.indexOf(e);
    return`<article class="ev-card" onclick="openPopup(${gi})" tabindex="0" role="button"
        aria-label="${esc(e.title)}${e.dates_label?" — "+esc(e.dates_label):""}"
        onkeydown="if(event.key==='Enter'||event.key===' ')openPopup(${gi})">
      <div class="ev-card-accent"></div>
      ${e.image?`<img class="ev-img" src="${e.image}" alt="" loading="lazy" aria-hidden="true">`:`<div class="ev-placeholder" aria-hidden="true">🎭</div>`}
      <div class="ev-body">
        <div class="ev-dates">${esc(e.dates_label||e.date_start||"")}</div>
        <div class="ev-title">${esc(e.title)}</div>
        ${e.category?`<div class="ev-cat">${esc(e.category)}</div>`:""}
        ${e.price?`<div class="ev-price">🎟 ${esc(e.price)}</div>`:""}
      </div>
    </article>`;
  }).join("")+`</div>`;
}

async function load(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get("id");
  const [tR,eR]=await Promise.allSettled([
    fetch("theaters.json?t="+Date.now()).then(r=>r.json()),
    fetch("events.json?t="+Date.now()).then(r=>r.json()),
  ]);
  const theaters=tR.status==="fulfilled"?(tR.value.theaters||[]):[];
  const allEvents=eR.status==="fulfilled"?(eR.value.events||[]):[];
  const theater=theaters.find(t=>t.id===id);
  if(!theater){
    document.getElementById("page-content").innerHTML=`<div class="loading-state" style="min-height:80vh"><span style="font-size:40px">🎭</span><span>Teatro não encontrado. <a href="teatros.html" style="color:var(--gold)">Ver todos</a></span></div>`;
    return;
  }
  TC=theater.color;
  document.title=`${theater.name} — Palco Vivo`;
  document.documentElement.style.setProperty("--tc",TC);
  const today=new Date();today.setHours(0,0,0,0);
  EVENTS=allEvents.filter(e=>e.theater===theater.theater_key).sort((a,b)=>(a.date_start||"").localeCompare(b.date_start||""));
  const upcoming=EVENTS.filter(e=>!e.date_end||new Date(e.date_end+"T00:00:00")>=today);
  const past=EVENTS.filter(e=>e.date_end&&new Date(e.date_end+"T00:00:00")<today);
  const salasHtml=theater.salas?.length?`<div class="th-salas" aria-label="Salas">${theater.salas.map(s=>`<span class="sala-tag">${s}</span>`).join("")}</div>`:"";
  document.getElementById("page-content").innerHTML=`
    <section class="theater-hero" aria-labelledby="th-name">
      <div class="th-bg-glow" aria-hidden="true"></div>
      <div class="th-inner">
        <a class="back-link" href="teatros.html">← Todos os teatros</a>
        <div class="th-color-bar" aria-hidden="true"></div>
        <h1 class="th-name" id="th-name">${esc(theater.name)}</h1>
        <p class="th-desc">${esc(theater.description)}</p>
        <div class="th-meta">
          <div class="th-meta-item"><span aria-hidden="true">📍</span>${esc(theater.address)}</div>
          ${theater.site?`<div class="th-meta-item"><span aria-hidden="true">🌐</span><a href="${theater.site}" target="_blank" rel="noopener">${theater.site.replace(/^https?:\/\//,"")}</a></div>`:""}
        </div>
        <div class="th-actions">
          ${theater.programacao?`<a class="btn-tc" href="${theater.programacao}" target="_blank" rel="noopener">Programação oficial ↗</a>`:""}
          <a class="btn-ghost" href="calendario.html">Ver no calendário</a>
        </div>
        ${salasHtml}
      </div>
    </section>
    <section class="prog-section" aria-labelledby="prog-h">
      <div class="prog-h" id="prog-h">
        <h2 class="prog-title">Programação atual e futura</h2>
        <span class="prog-count">${upcoming.length} espetáculo${upcoming.length!==1?"s":""}</span>
      </div>
      ${renderCards(upcoming,"futura")}
      ${past.length?`<div class="prog-h" style="margin-top:52px"><h2 class="prog-title">Anteriores</h2><span class="prog-count">${past.length}</span></div>${renderCards(past,"anteriores")}`:""}
    </section>`;
}
load();
</script>
</body>
</html>
