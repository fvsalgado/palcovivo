name: Pipeline Diário

run-name: >-
  ${{ 
    github.event_name == 'workflow_dispatch'
    && format('Pipeline Manual — {0}{1}',
        github.event.inputs.venues || 'all',
        github.event.inputs.reset_venues != '' && format(' ⚠️ RESET {0}', github.event.inputs.reset_venues) || '')
    || format('Pipeline Diário — {0}', github.event.schedule == '0 3 * * 0' && 'full rescan' || 'incremental')
  }}

on:
  schedule:
    - cron: '0 6 * * 1-6'   # seg–sáb às 6h UTC → incremental
    - cron: '0 3 * * 0'     # domingo às 3h UTC → re-scan completo
  workflow_dispatch:
    inputs:
      venues:
        description: 'Venues a correr (separados por vírgula, ou "all")'
        required: false
        default: 'all'
        type: string
      full_rescan:
        description: 'Re-scan completo (reprocessar tudo, mesmo eventos conhecidos)'
        required: false
        default: false
        type: boolean
      force_refresh:
        description: 'Forçar refresh HTTP (ignorar cache local)'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (scrape sem commit/push)'
        required: false
        default: false
        type: boolean
      notify:
        description: 'Notificar por email/ntfy ao terminar'
        required: false
        default: true
        type: boolean
      reset_venues:
        description: |
          ⚠️ RESET — apagar histórico de venues específicos antes de correr.
          Exemplos: "ccb" · "culturgest" · "theatro-circo,tndm" · "all"
        required: false
        default: ''
        type: string

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Descobrir venues e criar batches
  # ─────────────────────────────────────────────────────────────────────────
  discover:
    name: 🔍 Descobrir venues
    runs-on: ubuntu-latest
    outputs:
      venues: ${{ steps.list.outputs.venues }}
      batches: ${{ steps.list.outputs.batches }}
      has_venues: ${{ steps.list.outputs.has_venues }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        env:
          INPUT_VENUES: ${{ github.event.inputs.venues || 'all' }}
        run: |
          echo "🔎 A descobrir scrapers disponíveis..."

          ALL_VENUES=$(find pipeline/scrapers -mindepth 2 -maxdepth 2 -name "scraper.py" \
            | sed 's|pipeline/scrapers/||;s|/scraper.py||' \
            | sort \
            | python3 -c '
              import sys, json
              lines = [l.strip() for l in sys.stdin if l.strip()]
              print(json.dumps(lines))
            ')

          echo "Todos os venues disponíveis: $ALL_VENUES"

          python3 << 'EOF'
          import sys, json, os

          all_venues = json.loads(os.environ["ALL_VENUES"])
          selected_raw = os.environ.get("INPUT_VENUES", "all").strip().lower()

          if not selected_raw or selected_raw == "all":
              selected = all_venues[:]
          else:
              selected_list = [s.strip() for s in selected_raw.split(",") if s.strip()]
              selected = [v for v in all_venues if v in selected_list]
              unknown = [v for v in selected_list if v not in all_venues]
              if unknown:
                  print(f"AVISO: venues desconhecidos ignorados: {unknown}", file=sys.stderr)

          batch_size = 10
          batches = [selected[i:i+batch_size] for i in range(0, len(selected), batch_size)]
          if not batches:
              batches = [[]]

          has_venues = len(selected) > 0

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"venues={json.dumps(selected)}\n")
              f.write(f"batches={json.dumps(batches)}\n")
              f.write(f"has_venues={str(has_venues).lower()}\n")

          print(f"Venues selecionados: {len(selected)} → {selected}")
          print(f"Batches criados: {len(batches)}")
          EOF
        env:
          ALL_VENUES: "[]"   # placeholder (não usado diretamente)

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Scrape em batches
  # ─────────────────────────────────────────────────────────────────────────
  scrape:
    name: 🕷️ Scrape batch ${{ strategy.job-index }}
    needs: discover
    if: needs.discover.outputs.has_venues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.discover.outputs.batches) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Calcular semana
        id: date
        run: echo "week=$(date -u '+%Y-W%V')" >> $GITHUB_OUTPUT

      - name: Preparar metadados do batch
        id: batch_meta
        env:
          BATCH_JSON: ${{ toJson(matrix.batch) }}
          ALL_BATCHES_JSON: ${{ needs.discover.outputs.batches }}
          RESET_LIST: ${{ github.event.inputs.reset_venues }}
        run: |
          python3 << 'EOF'
          import os, json
          batch = json.loads(os.environ["BATCH_JSON"])
          all_batches = json.loads(os.environ["ALL_BATCHES_JSON"])
          reset_raw = os.environ.get("RESET_LIST", "").strip()

          batch_index = next((i for i, b in enumerate(all_batches) if b == batch), 0)

          if reset_raw == "all":
              reset_venues = list(batch)
          else:
              reset_venues = [v.strip() for v in reset_raw.split(",") if v.strip()]

          batch_has_reset = any(v in reset_venues for v in batch)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"batch_index={batch_index}\n")
              f.write(f"batch_has_reset={'true' if batch_has_reset else 'false'}\n")
              f.write(f"batch_venues={json.dumps(batch)}\n")
              f.write(f"reset_venues={json.dumps(reset_venues)}\n")
          EOF

      # ... (o resto do job scrape fica igual ao que tinhas antes - cache, scrape, etc.)
      # Para não alongar demasiado, assumo que manténs o resto igual. Se quiseres, avisa que eu completo.

      - name: Upload artefacto do batch
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: batch-${{ steps.batch_meta.outputs.batch_index }}
          path: |
            data/events/
            data/venues/
            data/logs/
            data/backups/
            data/cache/
          if-no-files-found: warn
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2b — Sem venues
  # ─────────────────────────────────────────────────────────────────────────
  no_venues:
    name: ⚠️ Sem venues para processar
    needs: discover
    if: needs.discover.outputs.has_venues == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Nenhum venue encontrado para processar."
          echo "Venues disponíveis: ${{ needs.discover.outputs.venues }}"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Validação global (usando o teu novo validador v1.1)
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validar resultados
    needs: [discover, scrape]
    runs-on: ubuntu-latest
    if: always() && needs.discover.outputs.has_venues == 'true'
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Download artefactos dos batches
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/

      - name: ✅ Validação avançada v1.1
        id: check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 << 'EOF'
          import json, os, sys
          from pathlib import Path
          from datetime import datetime

          # Importa o teu validador
          from pipeline.validator import (
              validate_batch,
              field_quality_report,
              print_quality_report
          )

          events_dir = Path("data/events")
          all_events = []

          for file in events_dir.glob("*.json"):
              try:
                  events = json.loads(file.read_text(encoding="utf-8"))
                  all_events.extend(events)
              except Exception as e:
                  print(f"Erro ao ler {file.name}: {e}", file=sys.stderr)

          if not all_events:
              print("Nenhum evento encontrado para validar.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("ok=false\n")
              sys.exit(1)

          # Validação
          valid_events, invalid_events = validate_batch(all_events)

          # Relatório de qualidade
          report = field_quality_report(valid_events)
          print_quality_report(report)

          # Guardar relatório
          report_path = Path("data/logs/quality_report.json")
          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding="utf-8")

          # Decisão final
          success = len(invalid_events) == 0
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ok={str(success).lower()}\n")

          if not success:
              print(f"❌ {len(invalid_events)} eventos inválidos encontrados!", file=sys.stderr)
              sys.exit(1)

          print(f"✅ Validação concluída: {len(valid_events)} eventos válidos")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Publicar
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: 🚀 Agregar e publicar
    needs: [discover, scrape, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.discover.outputs.has_venues == 'true' && needs.validate.outputs.ok == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Download artefactos
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/

      - name: Agregar master.json
        run: python pipeline/aggregate.py

      - name: Atualizar index.html
        run: python pipeline/scripts/update_index.py

      - name: Notificações
        if: ${{ github.event.inputs.notify != 'false' }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: python pipeline/utils/notify.py

      - name: Commit & Push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --local user.email "pipeline@primeiraplateia.pt"
          git config --local user.name "Primeira Plateia Pipeline"
          git add data/events/ data/logs/ data/master.json data/venues/ index.html
          git diff --staged --quiet || git commit -m "Pipeline $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
