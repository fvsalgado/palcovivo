name: Pipeline Diário

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Ignorar cache e re-scraping completo'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Descobrir venues
  # ─────────────────────────────────────────
  discover:
    name: Descobrir venues
    runs-on: ubuntu-latest
    outputs:
      venues: ${{ steps.list.outputs.venues }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          VENUES=$(find pipeline/scrapers -name "scraper.py" \
            | sed 's|pipeline/scrapers/||;s|/scraper.py||' \
            | sort \
            | python3 -c "import sys,json; print(json.dumps([l.strip() for l in sys.stdin]))")
          echo "venues=$VENUES" >> $GITHUB_OUTPUT
          echo "Venues: $VENUES"

  # ─────────────────────────────────────────
  # JOB 2 — Scrape paralelo (um job por venue)
  # ─────────────────────────────────────────
  scrape:
    name: Scrape ${{ matrix.venue }}
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        venue: ${{ fromJson(needs.discover.outputs.venues) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt -q

      - name: Scrape ${{ matrix.venue }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            python -m pipeline.run_venue ${{ matrix.venue }} --force
          else
            python -m pipeline.run_venue ${{ matrix.venue }}
          fi

      - name: Upload artefacto
        uses: actions/upload-artifact@v4
        with:
          name: venue-${{ matrix.venue }}
          path: |
            data/events/${{ matrix.venue }}.json
            data/venues/${{ matrix.venue }}.json
            data/logs/venue-${{ matrix.venue }}.json
          if-no-files-found: warn
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 3 — Agregar + publicar
  # ─────────────────────────────────────────
  publish:
    name: Agregar e publicar
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt -q

      - name: Download artefactos dos venues
        uses: actions/download-artifact@v4
        with:
          pattern: venue-*
          merge-multiple: true
          path: data/

      - name: Agregar e gerar master.json
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pipeline.aggregate

      - name: Actualizar index.html com novos dados
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python pipeline/scripts/update_index.py

      - name: Notificacoes
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: python -m pipeline.utils.notify

      - name: Commit e push
        run: |
          git config --local user.email "pipeline@primeiraplateia.pt"
          git config --local user.name "Primeira Plateia Pipeline"
          git add data/ index.html
          git diff --staged --quiet || git commit -m "Pipeline $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload relatorio
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report-${{ github.run_id }}
          path: data/logs/latest.json
          retention-days: 30
