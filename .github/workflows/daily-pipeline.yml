name: Pipeline Diário

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
    && format('Pipeline Manual — {0}{1}',
        github.event.inputs.venues || 'all',
        github.event.inputs.reset_venues != '' && format(' ⚠️ RESET {0}', github.event.inputs.reset_venues) || '')
    || format('Pipeline Diário — {0}', github.event.schedule == '0 3 * * 0' && 'full rescan' || 'incremental')
  }}

on:
  schedule:
    - cron: '0 6 * * 1-6'   # seg–sáb às 6h UTC  → incremental
    - cron: '0 3 * * 0'     # domingo às 3h UTC   → re-scan completo
  workflow_dispatch:
    inputs:
      venues:
        description: 'Venues a correr (separados por vírgula, ou "all")'
        required: false
        default: 'all'
        type: string
      full_rescan:
        description: 'Re-scan completo (reprocessar tudo, mesmo eventos conhecidos)'
        required: false
        default: false
        type: boolean
      force_refresh:
        description: 'Forçar refresh HTTP (ignorar cache local)'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (scrape sem commit/push)'
        required: false
        default: false
        type: boolean
      notify:
        description: 'Notificar por email/ntfy ao terminar'
        required: false
        default: true
        type: boolean
      reset_venues:
        description: |
          ⚠️ RESET — apagar histórico de venues específicos antes de correr.
          Exemplos: "ccb" · "culturgest" · "theatro-circo,tndm" · "all"
          Usar "all" para reset completo de todos os venues.
        required: false
        default: ''
        type: string

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Descobrir venues e criar batches
  # ─────────────────────────────────────────────────────────────────────────
  discover:
    name: 🔍 Descobrir venues
    runs-on: ubuntu-latest
    outputs:
      venues: ${{ steps.list.outputs.venues }}
      batches: ${{ steps.list.outputs.batches }}
      has_venues: ${{ steps.list.outputs.has_venues }}

    steps:
      - uses: actions/checkout@v4

      - id: list
        env:
          INPUT_VENUES: ${{ github.event.inputs.venues || 'all' }}
        run: |
          # Descobrir todos os scrapers disponíveis
          ALL_JSON=$(find pipeline/scrapers -mindepth 2 -maxdepth 2 -name "scraper.py" \
            | sed 's|pipeline/scrapers/||;s|/scraper.py||' \
            | sort \
            | python3 -c "
          import sys, json
          lines = [l.strip() for l in sys.stdin if l.strip()]
          print(json.dumps(lines))
          ")

          echo "Todos os venues disponíveis: $ALL_JSON"

          # Filtrar pela seleção do utilizador
          VENUES_JSON=$(python3 -c "
          import sys, json, os

          all_venues = json.loads(os.environ['ALL_JSON'])
          selected_raw = os.environ.get('INPUT_VENUES', 'all').strip()

          if not selected_raw or selected_raw == 'all':
              print(json.dumps(all_venues))
              sys.exit(0)

          selected = [s.strip() for s in selected_raw.split(',') if s.strip()]
          result = [v for v in all_venues if v in selected]
          unknown = [v for v in selected if v not in all_venues]
          if unknown:
              print(f'AVISO: venues desconhecidos ignorados: {unknown}', file=sys.stderr)
          print(json.dumps(result))
          " ALL_JSON="$ALL_JSON")

          echo "Venues selecionados: $VENUES_JSON"
          VENUE_COUNT=$(echo "$VENUES_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Total: $VENUE_COUNT venues"

          # Criar batches de até 10 venues
          BATCHES_JSON=$(python3 -c "
          import json, os
          venues = json.loads(os.environ['VENUES_JSON'])
          batch_size = 10
          batches = [venues[i:i+batch_size] for i in range(0, len(venues), batch_size)]
          # Garantir que nunca é lista vazia — o GitHub Actions não aceita matrix vazia
          if not batches:
              batches = [[]]
          print(json.dumps(batches))
          " VENUES_JSON="$VENUES_JSON")

          HAS_VENUES=$(python3 -c "
          import json, os
          venues = json.loads(os.environ['VENUES_JSON'])
          print('true' if venues else 'false')
          " VENUES_JSON="$VENUES_JSON")

          echo "venues=$VENUES_JSON" >> $GITHUB_OUTPUT
          echo "batches=$BATCHES_JSON" >> $GITHUB_OUTPUT
          echo "has_venues=$HAS_VENUES" >> $GITHUB_OUTPUT

          echo "Batches: $BATCHES_JSON"
          echo "has_venues: $HAS_VENUES"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Scrape em batches
  # Só corre se houver venues para processar
  # ─────────────────────────────────────────────────────────────────────────
  scrape:
    name: 🕷️ Scrape batch ${{ strategy.job-index }}
    needs: discover
    if: needs.discover.outputs.has_venues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.discover.outputs.batches) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Calcular semana (cache key)
        id: date
        run: echo "week=$(date -u '+%Y-W%V')" >> $GITHUB_OUTPUT

      - name: Calcular batch index e reset flag
        id: batch_meta
        env:
          BATCH_JSON: ${{ toJson(matrix.batch) }}
          ALL_BATCHES_JSON: ${{ needs.discover.outputs.batches }}
          RESET_LIST: ${{ github.event.inputs.reset_venues }}
        run: |
          python3 << 'EOF'
          import os, json

          batch = json.loads(os.environ["BATCH_JSON"])
          all_batches = json.loads(os.environ["ALL_BATCHES_JSON"])
          reset_raw = os.environ.get("RESET_LIST", "").strip()
          all_venues_json = os.environ.get("ALL_VENUES_JSON", "[]")

          # Encontrar índice deste batch
          batch_index = 0
          for i, b in enumerate(all_batches):
              if b == batch:
                  batch_index = i
                  break

          # Resolver reset_venues: "all" expande para todos os venues do batch
          if reset_raw == "all":
              reset_venues = list(batch)
              print(f"RESET ALL: a resetar todos os venues do batch: {reset_venues}")
          else:
              reset_venues = [v.strip() for v in reset_raw.split(",") if v.strip()]

          batch_has_reset = any(v in reset_venues for v in batch)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"batch_index={batch_index}\n")
              f.write(f"batch_has_reset={'true' if batch_has_reset else 'false'}\n")
              f.write(f"batch_venues={json.dumps(batch)}\n")
              f.write(f"reset_venues={json.dumps(reset_venues)}\n")

          print(f"Batch {batch_index}: {batch}")
          print(f"Tem reset: {batch_has_reset} ({reset_venues})")
          EOF

      - name: Restaurar cache HTTP do batch
        uses: actions/cache@v4
        with:
          path: data/cache
          key: >-
            http-cache-batch-${{ steps.batch_meta.outputs.batch_index }}-${{ steps.date.outputs.week }}${{
              steps.batch_meta.outputs.batch_has_reset == 'true'
              && format('-reset-{0}', github.run_id) || ''
            }}
          restore-keys: |
            http-cache-batch-${{ steps.batch_meta.outputs.batch_index }}-

      - name: 🕷️ Scrape venues do batch
        env:
          PYTHONPATH: ${{ github.workspace }}
          INPUT_FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
          BATCH_VENUES_JSON: ${{ steps.batch_meta.outputs.batch_venues }}
          RESET_VENUES_JSON: ${{ steps.batch_meta.outputs.reset_venues }}
          FULL_RESCAN: >-
            ${{
              github.event.inputs.full_rescan == 'true' ||
              (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0')
            }}
        run: |
          python3 << 'EOF'
          import os, json, subprocess, sys, shutil

          batch_venues = json.loads(os.environ["BATCH_VENUES_JSON"])
          reset_venues = json.loads(os.environ.get("RESET_VENUES_JSON", "[]"))
          force_refresh = os.environ.get("INPUT_FORCE_REFRESH", "false") == "true"

          if not batch_venues:
              print("Batch vazio — nada a processar")
              sys.exit(0)

          print(f"A processar batch: {batch_venues}")
          if reset_venues:
              print(f"Venues em reset: {reset_venues}")

          for venue in batch_venues:
              print(f"\n{'='*60}")
              print(f"→ Venue: {venue}")

              # RESET: apagar histórico do venue se solicitado
              if venue in reset_venues:
                  print(f"⚠️  RESET: a apagar histórico de {venue}")
                  for path in [f"data/events/{venue}.json", f"data/cache/{venue}.cache.json"]:
                      if os.path.exists(path):
                          os.remove(path)
                          print(f"   Apagado: {path}")
                  backup_dir = f"data/backups/{venue}"
                  if os.path.exists(backup_dir):
                      shutil.rmtree(backup_dir)
                      print(f"   Apagado: {backup_dir}")
                  # Apagar também cache HTTP por URL
                  http_cache_dir = f"data/cache/_http/{venue}"
                  if os.path.exists(http_cache_dir):
                      shutil.rmtree(http_cache_dir)
                      print(f"   Apagado: {http_cache_dir}")
                  print(f"✓ Histórico de {venue} apagado — scrape do zero")

              # Argumentos do scraper
              args = []
              if force_refresh or venue in reset_venues:
                  args.append("--force")

              cmd = ["python", "pipeline/run_venue.py", venue] + args
              print(f"Comando: {' '.join(cmd)}")

              result = subprocess.run(cmd, capture_output=False)
              if result.returncode != 0:
                  print(f"⚠️  {venue} terminou com código {result.returncode}", file=sys.stderr)

          print(f"\n{'='*60}")
          print("Batch completo.")
          EOF

      - name: Upload artefacto do batch
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: batch-${{ steps.batch_meta.outputs.batch_index }}
          path: |
            data/events/
            data/venues/
            data/logs/
            data/backups/
            data/cache/
          if-no-files-found: warn
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2b — Skip gracioso quando não há venues
  # ─────────────────────────────────────────────────────────────────────────
  no_venues:
    name: ⚠️ Sem venues para processar
    needs: discover
    if: needs.discover.outputs.has_venues == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Aviso
        run: |
          echo "Nenhum venue encontrado para processar."
          echo "Verifica se os scrapers existem em pipeline/scrapers/<venue>/scraper.py"
          echo "Venues disponíveis: ${{ needs.discover.outputs.venues }}"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Validação global
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validar resultados
    needs: [discover, scrape]
    runs-on: ubuntu-latest
    if: always() && needs.discover.outputs.has_venues == 'true'
    outputs:
      ok: ${{ steps.check.outputs.ok }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Download artefactos dos batches
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/

      - name: ✅ Verificar sanidade dos dados
        id: check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 << 'EOF'
          import json, os, sys, subprocess
          from pathlib import Path
          from datetime import datetime
          from pipeline.core.cache import credibility_score

          events_dir = Path("data/events")
          today = datetime.now().strftime("%Y-%m-%d")
          cutoff_future = str(int(today[:4]) + 2) + today[4:]

          prev_counts = {}
          for f in sorted(events_dir.glob("*.json")):
              try:
                  raw = subprocess.run(
                      ["git", "show", f"HEAD:data/events/{f.name}"],
                      capture_output=True, text=True, timeout=10
                  )
                  if raw.returncode == 0:
                      prev_counts[f.stem] = len(json.loads(raw.stdout))
              except Exception:
                  pass

          errors = []
          warnings = []
          table_rows = []

          for f in sorted(events_dir.glob("*.json")):
              venue = f.stem
              try:
                  events = json.loads(f.read_text(encoding="utf-8"))
              except Exception as e:
                  errors.append(f"{venue}: erro ao ler JSON — {e}")
                  continue

              n = len(events)
              if n == 0:
                  errors.append(f"{venue}: 0 eventos — possível falha de scraping")

              prev_n = prev_counts.get(venue, 0)
              if prev_n >= 10 and n < prev_n * 0.5:
                  warnings.append(
                      f"{venue}: queda abrupta ({prev_n} → {n}, "
                      f"-{round((1 - n/prev_n) * 100)}%)"
                  )

              bad_dates = [
                  e.get("id", "?")
                  for e in events
                  if (e.get("date_first") or "") > cutoff_future
              ]
              if bad_dates:
                  warnings.append(f"{venue}: {len(bad_dates)} evento(s) com data > 2 anos")

              scores = [credibility_score(e) for e in events]
              avg = round(sum(scores)/len(scores), 2) if scores else 0.0
              if avg < 0.40:
                  warnings.append(f"{venue}: score médio baixo ({avg:.2f})")

              delta = ""
              if prev_n > 0:
                  diff = n - prev_n
                  delta = f" ({'+' if diff >= 0 else ''}{diff})"
              table_rows.append(f"| {venue} | {n}{delta} | {avg:.2f} | {'⚠️' if bad_dates else '✓'} |")

          summary_lines = [
              "## Resumo do Pipeline",
              "",
              f"**Data:** {today}",
              "",
              "| Venue | Eventos | Score médio | Datas |",
              "|-------|---------|-------------|-------|",
          ] + table_rows

          if warnings:
              summary_lines += ["", "### ⚠️ Avisos", ""] + [f"- {w}" for w in warnings]
          if errors:
              summary_lines += ["", "### ❌ Erros críticos", ""] + [f"- {e}" for e in errors]
          else:
              summary_lines += ["", "### ✅ Validação passou sem erros críticos"]

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(summary_lines) + "\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ok={'false' if errors else 'true'}\n")

          if errors:
              print("ERROS DE VALIDAÇÃO:", errors, file=sys.stderr)
              sys.exit(1)
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Agregar + publicar
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: 🚀 Agregar e publicar
    needs: [discover, scrape, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.discover.outputs.has_venues == 'true' && needs.validate.outputs.ok != 'false'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Download artefactos dos batches
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/

      - name: Agregar e gerar master.json
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python pipeline/aggregate.py

      - name: Actualizar index.html com novos dados
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python pipeline/scripts/update_index.py

      - name: 📬 Notificações
        if: ${{ github.event.inputs.notify != 'false' }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: python pipeline/utils/notify.py

      - name: 💾 Commit e push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          INPUT_VENUES: ${{ github.event.inputs.venues || 'all' }}
          INPUT_RESET_VENUES: ${{ github.event.inputs.reset_venues }}
          INPUT_FULL_RESCAN: ${{ github.event.inputs.full_rescan }}
          INPUT_FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
        run: |
          git config --local user.email "pipeline@primeiraplateia.pt"
          git config --local user.name "Primeira Plateia Pipeline"
          git add data/events/ data/logs/ data/master.json data/venues/ data/backups/ index.html
          COMMIT_MSG="Pipeline $(date -u '+%Y-%m-%d %H:%M UTC') — $INPUT_VENUES"
          [ -n "$INPUT_RESET_VENUES" ] && COMMIT_MSG="$COMMIT_MSG [RESET: $INPUT_RESET_VENUES]"
          [ "$INPUT_FULL_RESCAN" = "true" ] && COMMIT_MSG="$COMMIT_MSG [re-scan completo]"
          [ "$INPUT_FORCE_REFRESH" = "true" ] && COMMIT_MSG="$COMMIT_MSG [refresh HTTP]"
          git diff --staged --quiet || (
            git commit -m "$COMMIT_MSG" \
            && git pull --rebase origin main \
            && git push \
            || (echo "❌ ERRO: commit/rebase/push falhou" && exit 1)
          )

      - name: ℹ️ Dry run — sem commit
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "ℹ️ Dry run activo — dados gerados mas não commitados."

      - name: Upload relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report-${{ github.run_id }}
          path: data/logs/latest.json
          retention-days: 30
