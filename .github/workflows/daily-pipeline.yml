name: Pipeline Diário

run-name: >-
  ${{ 
    github.event_name == 'workflow_dispatch'
    && format('Pipeline Manual — {0}{1}',
        github.event.inputs.venues || 'all',
        github.event.inputs.reset_venues != '' && format(' ⚠️ RESET {0}', github.event.inputs.reset_venues) || '')
    || format('Pipeline Diário — {0}', github.event.schedule == '0 3 * * 0' && 'full rescan' || 'incremental')
  }}

on:
  schedule:
    - cron: '0 6 * * 1-6'   # seg–sáb às 6h UTC → incremental
    - cron: '0 3 * * 0'     # domingo às 3h UTC → re-scan completo

  workflow_dispatch:
    inputs:
      venues:
        description: 'Venues a correr (separados por vírgula, ou "all")'
        required: false
        default: 'all'
        type: string
      full_rescan:
        description: 'Re-scan completo (reprocessar tudo, mesmo eventos conhecidos)'
        required: false
        default: false
        type: boolean
      force_refresh:
        description: 'Forçar refresh HTTP (ignorar cache local)'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (scrape sem commit/push)'
        required: false
        default: false
        type: boolean
      notify:
        description: 'Notificar por email/ntfy ao terminar'
        required: false
        default: true
        type: boolean
      reset_venues:
        description: |
          ⚠️ RESET — apagar histórico de venues específicos antes de correr.
          Exemplos: "ccb" · "culturgest" · "theatro-circo,tndm" · "all"
        required: false
        default: ''
        type: string

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Descobrir venues e criar batches
  # ─────────────────────────────────────────────────────────────────────────
  discover:
    name: 🔍 Descobrir venues
    runs-on: ubuntu-latest
    outputs:
      venues: ${{ steps.list.outputs.venues }}
      batches: ${{ steps.list.outputs.batches }}
      has_venues: ${{ steps.list.outputs.has_venues }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        env:
          INPUT_VENUES: ${{ github.event.inputs.venues || 'all' }}
        run: |
          echo "🔎 A descobrir scrapers disponíveis..."

          # Descobrir todos os venues com scraper.py
          ALL_VENUES=$(find pipeline/scrapers -mindepth 2 -maxdepth 2 -name "scraper.py" \
            | sed 's|pipeline/scrapers/||;s|/scraper.py||' \
            | sort \
            | python3 -c '
              import sys, json
              lines = [l.strip() for l in sys.stdin if l.strip()]
              print(json.dumps(lines))
            ')

          echo "Todos os venues disponíveis: $ALL_VENUES"

          # Processar seleção e batches
          python3 << 'EOF'
          import sys, json, os

          all_venues = json.loads(os.environ.get("ALL_VENUES", "[]"))
          selected_raw = os.environ.get("INPUT_VENUES", "all").strip().lower()

          if not selected_raw or selected_raw == "all":
              selected = all_venues[:]
          else:
              selected_list = [s.strip() for s in selected_raw.split(",") if s.strip()]
              selected = [v for v in all_venues if v in selected_list]
              unknown = [v for v in selected_list if v not in all_venues]
              if unknown:
                  print(f"AVISO: venues desconhecidos ignorados: {unknown}", file=sys.stderr)

          # Criar batches de no máximo 10 venues
          batch_size = 10
          batches = [selected[i:i + batch_size] for i in range(0, len(selected), batch_size)]
          if not batches:
              batches = [[]]

          has_venues = len(selected) > 0

          # Guardar outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"venues={json.dumps(selected)}\n")
              f.write(f"batches={json.dumps(batches)}\n")
              f.write(f"has_venues={str(has_venues).lower()}\n")

          print(f"Venues selecionados: {len(selected)} → {selected}")
          print(f"Batches criados: {len(batches)}")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Scrape em batches
  # ─────────────────────────────────────────────────────────────────────────
  scrape:
    name: 🕷️ Scrape batch ${{ strategy.job-index }}
    needs: discover
    if: needs.discover.outputs.has_venues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.discover.outputs.batches) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Calcular semana (cache key)
        id: date
        run: echo "week=$(date -u '+%Y-W%V')" >> $GITHUB_OUTPUT

      - name: Preparar metadados do batch
        id: batch_meta
        env:
          BATCH_JSON: ${{ toJson(matrix.batch) }}
          ALL_BATCHES_JSON: ${{ needs.discover.outputs.batches }}
          RESET_LIST: ${{ github.event.inputs.reset_venues }}
        run: |
          python3 << 'EOF'
          import os, json

          batch = json.loads(os.environ["BATCH_JSON"])
          all_batches = json.loads(os.environ["ALL_BATCHES_JSON"])
          reset_raw = os.environ.get("RESET_LIST", "").strip()

          # Encontrar índice do batch atual
          batch_index = next((i for i, b in enumerate(all_batches) if b == batch), 0)

          # Resolver reset_venues
          if reset_raw == "all":
              reset_venues = list(batch)
          else:
              reset_venues = [v.strip() for v in reset_raw.split(",") if v.strip()]

          batch_has_reset = any(v in reset_venues for v in batch)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"batch_index={batch_index}\n")
              f.write(f"batch_has_reset={'true' if batch_has_reset else 'false'}\n")
              f.write(f"batch_venues={json.dumps(batch)}\n")
              f.write(f"reset_venues={json.dumps(reset_venues)}\n")

          print(f"Batch {batch_index}: {batch}")
          print(f"Reset ativado: {batch_has_reset} → {reset_venues}")
          EOF

      - name: Restaurar circuit breaker
        uses: actions/cache@v4
        with:
          path: data/cache/circuit_breaker.json
          key: circuit-breaker-${{ github.run_id }}
          restore-keys: circuit-breaker-

      - name: Restaurar cache HTTP do batch
        uses: actions/cache@v4
        with:
          path: data/cache
          key: >-
            http-cache-batch-${{ steps.batch_meta.outputs.batch_index }}-${{ steps.date.outputs.week }}${{
              steps.batch_meta.outputs.batch_has_reset == 'true' && format('-reset-{0}', github.run_id) || ''
            }}
          restore-keys: |
            http-cache-batch-${{ steps.batch_meta.outputs.batch_index }}-

      - name: 🕷️ Scrape venues do batch
        env:
          PYTHONPATH: ${{ github.workspace }}
          INPUT_FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
          BATCH_VENUES_JSON: ${{ steps.batch_meta.outputs.batch_venues }}
          RESET_VENUES_JSON: ${{ steps.batch_meta.outputs.reset_venues }}
          FULL_RESCAN: >-
            ${{ github.event.inputs.full_rescan == 'true' ||
               (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0') }}
        run: |
          python3 << 'EOF'
          import os, json, subprocess, sys, shutil

          batch_venues = json.loads(os.environ["BATCH_VENUES_JSON"])
          reset_venues = json.loads(os.environ.get("RESET_VENUES_JSON", "[]"))
          force_refresh = os.environ.get("INPUT_FORCE_REFRESH", "false") == "true"

          if not batch_venues:
              print("Batch vazio — nada a processar")
              sys.exit(0)

          for venue in batch_venues:
              print(f"\n{'='*70}")
              print(f"→ Processando venue: {venue}")

              # RESET se aplicável
              if venue in reset_venues:
                  print(f"⚠️  RESET: Apagando histórico de {venue}")
                  for p in [f"data/events/{venue}.json", f"data/cache/{venue}.cache.json"]:
                      if os.path.exists(p):
                          os.remove(p)
                  if os.path.exists(f"data/backups/{venue}"):
                      shutil.rmtree(f"data/backups/{venue}")
                  if os.path.exists(f"data/cache/_http/{venue}"):
                      shutil.rmtree(f"data/cache/_http/{venue}")

              # Executar scraper
              args = ["--force"] if force_refresh or venue in reset_venues else []
              cmd = ["python", "pipeline/run_venue.py", venue] + args
              print(f"Executando: {' '.join(cmd)}")

              result = subprocess.run(cmd)
              if result.returncode != 0:
                  print(f"⚠️ {venue} falhou com código {result.returncode}", file=sys.stderr)

          print(f"\nBatch concluído: {batch_venues}")
          EOF

      - name: Guardar circuit breaker
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/cache/circuit_breaker.json
          key: circuit-breaker-${{ github.run_id }}

      - name: Upload artefacto do batch
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: batch-${{ steps.batch_meta.outputs.batch_index }}
          path: |
            data/events/
            data/venues/
            data/logs/
            data/backups/
            data/cache/
          if-no-files-found: warn
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2b — Sem venues
  # ─────────────────────────────────────────────────────────────────────────
  no_venues:
    name: ⚠️ Sem venues para processar
    needs: discover
    if: needs.discover.outputs.has_venues == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Nenhum venue encontrado para processar."

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Validação (com o teu validador v1.1)
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validar resultados
    needs: [discover, scrape]
    runs-on: ubuntu-latest
    if: always() && needs.discover.outputs.has_venues == 'true'
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Download artefactos
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/

      - name: ✅ Validação Avançada v1.1
        id: check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 << 'EOF'
          import json, os, sys
          from pathlib import Path

          # Importa o validador (certifica-te que o ficheiro existe em pipeline/validator.py)
          from pipeline.validator import validate_batch, field_quality_report, print_quality_report

          events_dir = Path("data/events")
          all_events = []

          for file in events_dir.glob("*.json"):
              try:
                  data = json.loads(file.read_text(encoding="utf-8"))
                  all_events.extend(data)
              except Exception as e:
                  print(f"Erro ao ler {file.name}: {e}")

          if not all_events:
              print("Nenhum evento para validar.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("ok=false\n")
              sys.exit(0)

          valid, invalid = validate_batch(all_events)
          report = field_quality_report(valid)
          print_quality_report(report)

          # Guardar relatório
          Path("data/logs").mkdir(exist_ok=True)
          Path("data/logs/quality_report.json").write_text(
              json.dumps(report, indent=2, ensure_ascii=False)
          )

          success = len(invalid) == 0
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ok={str(success).lower()}\n")

          if not success:
              print(f"❌ {len(invalid)} eventos inválidos!", file=sys.stderr)
              sys.exit(1)

          print(f"✅ Validação OK: {len(valid)} eventos válidos")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Agregar e publicar
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: 🚀 Agregar e publicar
    needs: [discover, scrape, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.discover.outputs.has_venues == 'true' && needs.validate.outputs.ok == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Download artefactos
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/

      - name: Agregar master.json
        run: python pipeline/aggregate.py

      - name: Atualizar index.html
        run: python pipeline/scripts/update_index.py

      - name: Notificações
        if: ${{ github.event.inputs.notify != 'false' }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: python pipeline/utils/notify.py

      - name: Commit & Push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --local user.email "pipeline@primeiraplateia.pt"
          git config --local user.name "Primeira Plateia Pipeline"
          git add data/events/ data/logs/ data/master.json data/venues/ index.html
          git diff --staged --quiet || git commit -m "Pipeline $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main && git push || echo "Nenhuma alteração para commitar"
