name: Pipeline Diário

run-name: >-
  ${{ 
    github.event_name == 'workflow_dispatch'
    && format('Pipeline Manual — {0}{1}',
        github.event.inputs.venues || 'all',
        github.event.inputs.reset_venues != '' && format(' ⚠️ RESET {0}', github.event.inputs.reset_venues) || '')
    || format('Pipeline Diário — {0}', github.event.schedule == '0 3 * * 0' && 'full rescan' || 'incremental')
  }}

on:
  schedule:
    - cron: '0 6 * * 1-6'
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      venues:
        description: 'Venues a correr (separados por vírgula, ou "all")'
        required: false
        default: 'all'
        type: string
      full_rescan:
        description: 'Re-scan completo'
        required: false
        default: false
        type: boolean
      force_refresh:
        description: 'Forçar refresh HTTP'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (sem commit)'
        required: false
        default: false
        type: boolean
      notify:
        description: 'Notificar ao terminar'
        required: false
        default: true
        type: boolean
      reset_venues:
        description: 'RESET venues (all ou lista)'
        required: false
        default: ''
        type: string

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  # ====================== JOB 1: DISCOVER ======================
  discover:
    name: 🔍 Descobrir venues
    runs-on: ubuntu-latest
    outputs:
      venues: ${{ steps.list.outputs.venues }}
      batches: ${{ steps.list.outputs.batches }}
      has_venues: ${{ steps.list.outputs.has_venues }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        env:
          INPUT_VENUES: ${{ github.event.inputs.venues || 'all' }}
        run: |
          echo "🔎 A descobrir scrapers..."

          # 1. Lista todos os venues
          ALL_VENUES=$(find pipeline/scrapers -mindepth 2 -maxdepth 2 -name "scraper.py" \
            | sed 's|pipeline/scrapers/||;s|/scraper.py||' \
            | sort \
            | python3 -c '
              import sys, json
              print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))
            ')

          echo "Todos os venues: $ALL_VENUES"

          # 2. Python limpo (sem problema de indentação YAML)
          cat > /tmp/discover.py << 'PYEOF'
import sys, json, os

all_venues = json.loads(os.environ.get("ALL_VENUES", "[]"))
selected_raw = os.environ.get("INPUT_VENUES", "all").strip().lower()

if not selected_raw or selected_raw == "all":
    selected = all_venues[:]
else:
    selected_list = [s.strip() for s in selected_raw.split(",") if s.strip()]
    selected = [v for v in all_venues if v in selected_list]
    unknown = [v for v in selected_list if v not in all_venues]
    if unknown:
        print(f"AVISO: venues desconhecidos: {unknown}", file=sys.stderr)

batch_size = 10
batches = [selected[i:i+batch_size] for i in range(0, len(selected), batch_size)]
if not batches:
    batches = [[]]

has_venues = len(selected) > 0

with open(os.environ["GITHUB_OUTPUT"], "a") as f:
    f.write(f"venues={json.dumps(selected)}\n")
    f.write(f"batches={json.dumps(batches)}\n")
    f.write(f"has_venues={str(has_venues).lower()}\n")

print(f"Venues selecionados: {len(selected)} → {selected}")
print(f"Batches: {len(batches)}")
PYEOF

          ALL_VENUES="$ALL_VENUES" python3 /tmp/discover.py
          rm -f /tmp/discover.py
        env:
          ALL_VENUES: "[]"

  # ====================== JOB 2: SCRAPE ======================
  scrape:
    name: 🕷️ Scrape batch ${{ strategy.job-index }}
    needs: discover
    if: needs.discover.outputs.has_venues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.discover.outputs.batches) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Calcular semana
        id: date
        run: echo "week=$(date -u '+%Y-W%V')" >> $GITHUB_OUTPUT

      - name: Metadados do batch
        id: batch_meta
        env:
          BATCH_JSON: ${{ toJson(matrix.batch) }}
          ALL_BATCHES: ${{ needs.discover.outputs.batches }}
          RESET: ${{ github.event.inputs.reset_venues }}
        run: |
          cat > /tmp/batch_meta.py << 'PYEOF'
import os, json
batch = json.loads(os.environ["BATCH_JSON"])
all_batches = json.loads(os.environ["ALL_BATCHES"])
reset_raw = os.environ.get("RESET", "").strip()

batch_index = next((i for i, b in enumerate(all_batches) if b == batch), 0)

if reset_raw == "all":
    reset_venues = list(batch)
else:
    reset_venues = [v.strip() for v in reset_raw.split(",") if v.strip()]

has_reset = any(v in reset_venues for v in batch)

with open(os.environ["GITHUB_OUTPUT"], "a") as f:
    f.write(f"batch_index={batch_index}\n")
    f.write(f"batch_has_reset={'true' if has_reset else 'false'}\n")
    f.write(f"batch_venues={json.dumps(batch)}\n")
    f.write(f"reset_venues={json.dumps(reset_venues)}\n")
PYEOF
          python3 /tmp/batch_meta.py
          rm -f /tmp/batch_meta.py

      # Cache (mantido simples)
      - name: Restaurar cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: http-cache-${{ github.run_id }}
          restore-keys: http-cache-

      - name: 🕷️ Scrape venues
        env:
          PYTHONPATH: ${{ github.workspace }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
          BATCH_VENUES: ${{ steps.batch_meta.outputs.batch_venues }}
          RESET_VENUES: ${{ steps.batch_meta.outputs.reset_venues }}
        run: |
          cat > /tmp/scrape_batch.py << 'PYEOF'
import os, json, subprocess, sys, shutil
batch_venues = json.loads(os.environ.get("BATCH_VENUES", "[]"))
reset_venues = json.loads(os.environ.get("RESET_VENUES", "[]"))
force = os.environ.get("FORCE_REFRESH") == "true"

for venue in batch_venues:
    print(f"\n{'='*70}\n→ Venue: {venue}")

    if venue in reset_venues:
        print(f"⚠️ RESET: apagando {venue}")
        for p in [f"data/events/{venue}.json", f"data/cache/{venue}.cache.json"]:
            if os.path.exists(p): os.remove(p)
        if os.path.exists(f"data/backups/{venue}"):
            shutil.rmtree(f"data/backups/{venue}")
        if os.path.exists(f"data/cache/_http/{venue}"):
            shutil.rmtree(f"data/cache/_http/{venue}")

    args = ["--force"] if force or venue in reset_venues else []
    cmd = ["python", "pipeline/run_venue.py", venue] + args
    result = subprocess.run(cmd)
    if result.returncode != 0:
        print(f"⚠️ {venue} falhou com código {result.returncode}", file=sys.stderr)
PYEOF
          python3 /tmp/scrape_batch.py
          rm -f /tmp/scrape_batch.py

      - name: Upload artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: batch-${{ steps.batch_meta.outputs.batch_index }}
          path: data/
          retention-days: 3

  # ====================== JOB 2b: NO VENUES ======================
  no_venues:
    name: ⚠️ Sem venues
    needs: discover
    if: needs.discover.outputs.has_venues == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Nenhum venue encontrado."

  # ====================== JOB 3: VALIDATE ======================
  validate:
    name: ✅ Validar
    needs: [discover, scrape]
    runs-on: ubuntu-latest
    if: always() && needs.discover.outputs.has_venues == 'true'
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt -q
      - uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/
      - id: check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "✅ Validação (substituir pelo teu validator.py quando estiver pronto)"
          echo "ok=true" >> $GITHUB_OUTPUT

  # ====================== JOB 4: PUBLISH ======================
  publish:
    name: 🚀 Publicar
    needs: [discover, scrape, validate]
    runs-on: ubuntu-latest
    if: always() && needs.discover.outputs.has_venues == 'true' && needs.validate.outputs.ok == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt -q
      - uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/
      - run: python pipeline/aggregate.py
      - run: python pipeline/scripts/update_index.py
      - name: Commit & Push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --local user.email "pipeline@primeiraplateia.pt"
          git config --local user.name "Primeira Plateia Pipeline"
          git add data/events/ data/logs/ data/master.json data/venues/ index.html
          git diff --staged --quiet || git commit -m "Pipeline $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main && git push || echo "Sem alterações"
