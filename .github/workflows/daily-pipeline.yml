name: Pipeline Diário

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Ignorar cache e re-scraping completo'
        required: false
        default: 'false'
        type: boolean
      venues:
        description: 'Venues a correr (vírgula, ou "all" para todos)'
        required: false
        default: 'all'
        type: string

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Descobrir venues
  # ─────────────────────────────────────────
  discover:
    name: Descobrir venues
    runs-on: ubuntu-latest
    outputs:
      venues: ${{ steps.list.outputs.venues }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        run: |
          ALL=$(find pipeline/scrapers -name "scraper.py" \
            | sed 's|pipeline/scrapers/||;s|/scraper.py||' \
            | sort \
            | python3 -c "import sys,json; print(json.dumps([l.strip() for l in sys.stdin]))")

          SELECTED="${{ github.event.inputs.venues }}"

          if [ -z "$SELECTED" ] || [ "$SELECTED" = "all" ]; then
            echo "venues=$ALL" >> $GITHUB_OUTPUT
            echo "A correr todos os venues: $ALL"
          else
            FILTERED=$(echo "$SELECTED" | python3 -c "
          import sys, json
          selected = [s.strip() for s in sys.stdin.read().split(',') if s.strip()]
          available = json.loads('$ALL')
          result = [v for v in available if v in selected]
          unknown = [v for v in selected if v not in available]
          if unknown:
              print(f'AVISO: venues desconhecidos ignorados: {unknown}', file=sys.stderr)
          print(json.dumps(result))
          ")
            echo "venues=$FILTERED" >> $GITHUB_OUTPUT
            echo "A correr venues seleccionados: $FILTERED"
          fi

  # ─────────────────────────────────────────
  # JOB 2 — Restore cache do run anterior
  # ─────────────────────────────────────────
  restore-cache:
    name: Restaurar cache HTTP
    runs-on: ubuntu-latest
    needs: discover
    steps:
      - uses: actions/checkout@v4

      - name: Restaurar cache de URLs HTTP (ETag/Last-Modified)
        uses: actions/cache@v4
        with:
          path: data/cache
          key: http-cache-${{ github.run_id }}
          restore-keys: |
            http-cache-

      - name: Upload cache para jobs paralelos
        uses: actions/upload-artifact@v4
        with:
          name: http-cache
          path: data/cache
          if-no-files-found: ignore
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 3 — Scrape paralelo (um job por venue)
  # ─────────────────────────────────────────
  scrape:
    name: Scrape ${{ matrix.venue }}
    needs: [discover, restore-cache]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        venue: ${{ fromJson(needs.discover.outputs.venues) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt -q

      - name: Download cache HTTP
        uses: actions/download-artifact@v4
        with:
          name: http-cache
          path: data/cache
        continue-on-error: true

      - name: Scrape ${{ matrix.venue }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            python pipeline/run_venue.py ${{ matrix.venue }} --force
          else
            python pipeline/run_venue.py ${{ matrix.venue }}
          fi

      - name: Upload artefacto
        uses: actions/upload-artifact@v4
        with:
          name: venue-${{ matrix.venue }}
          path: |
            data/events/${{ matrix.venue }}.json
            data/venues/${{ matrix.venue }}.json
            data/logs/venue-${{ matrix.venue }}.json
            data/cache/${{ matrix.venue }}/
          if-no-files-found: warn
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 4 — Agregar + publicar
  # ─────────────────────────────────────────
  publish:
    name: Agregar e publicar
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt -q

      - name: Download artefactos dos venues
        uses: actions/download-artifact@v4
        with:
          pattern: venue-*
          merge-multiple: true
          path: data/

      - name: Agregar e gerar master.json
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python pipeline/aggregate.py

      - name: Actualizar index.html com novos dados
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python pipeline/scripts/update_index.py

      - name: Guardar cache HTTP para próximo run
        uses: actions/cache@v4
        with:
          path: data/cache
          key: http-cache-${{ github.run_id }}

      - name: Notificacoes
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: python pipeline/utils/notify.py

      - name: Commit e push
        run: |
          git config --local user.email "pipeline@primeiraplateia.pt"
          git config --local user.name "Primeira Plateia Pipeline"
          git add data/events/ data/logs/ data/master.json data/venues/ index.html
          git diff --staged --quiet || git commit -m "Pipeline $(date -u '+%Y-%m-%d %H:%M UTC') — ${{ github.event.inputs.venues || 'all' }}"
          git pull --rebase origin main
          git push

      - name: Upload relatorio
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report-${{ github.run_id }}
          path: data/logs/latest.json
          retention-days: 30
