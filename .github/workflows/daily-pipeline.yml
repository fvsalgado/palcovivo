name: Pipeline Diário

run-name: >-
  ${{ 
    github.event_name == 'workflow_dispatch'
    && format('Pipeline Manual — {0}{1}',
        github.event.inputs.venues || 'all',
        github.event.inputs.reset_venues != '' && format(' ⚠️ RESET {0}', github.event.inputs.reset_venues) || '')
    || format('Pipeline Diário — {0}', github.event.schedule == '0 3 * * 0' && 'full rescan' || 'incremental')
  }}

on:
  schedule:
    - cron: '0 6 * * 1-6'
    - cron: '0 3 * * 0'

  workflow_dispatch:
    inputs:
      venues:
        description: 'Venues a correr (separados por vírgula, ou "all")'
        required: false
        default: 'all'
        type: string
      full_rescan:
        description: 'Re-scan completo'
        required: false
        default: false
        type: boolean
      force_refresh:
        description: 'Forçar refresh HTTP'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (sem commit)'
        required: false
        default: false
        type: boolean
      notify:
        description: 'Notificar ao terminar'
        required: false
        default: true
        type: boolean
      reset_venues:
        description: 'RESET venues específicos (all ou lista)'
        required: false
        default: ''
        type: string

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  discover:
    name: 🔍 Descobrir venues
    runs-on: ubuntu-latest
    outputs:
      venues: ${{ steps.list.outputs.venues }}
      batches: ${{ steps.list.outputs.batches }}
      has_venues: ${{ steps.list.outputs.has_venues }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        env:
          INPUT_VENUES: ${{ github.event.inputs.venues || 'all' }}
        run: |
          echo "🔎 A descobrir scrapers disponíveis..."

          ALL_VENUES=$(find pipeline/scrapers -mindepth 2 -maxdepth 2 -name "scraper.py" \
            | sed 's|pipeline/scrapers/||;s|/scraper.py||' \
            | sort \
            | python3 -c '
              import sys, json
              lines = [l.strip() for l in sys.stdin if l.strip()]
              print(json.dumps(lines))
            ')

          echo "Todos os venues disponíveis: $ALL_VENUES"

          python3 - << 'PYEOF'
import sys, json, os

all_venues = json.loads(os.environ.get("ALL_VENUES", "[]"))
selected_raw = os.environ.get("INPUT_VENUES", "all").strip().lower()

if not selected_raw or selected_raw == "all":
    selected = all_venues[:]
else:
    selected_list = [s.strip() for s in selected_raw.split(",") if s.strip()]
    selected = [v for v in all_venues if v in selected_list]
    unknown = [v for v in selected_list if v not in all_venues]
    if unknown:
        print(f"AVISO: venues desconhecidos ignorados: {unknown}", file=sys.stderr)

batch_size = 10
batches = [selected[i:i + batch_size] for i in range(0, len(selected), batch_size)]
if not batches:
    batches = [[]]

has_venues = len(selected) > 0

with open(os.environ["GITHUB_OUTPUT"], "a") as f:
    f.write(f"venues={json.dumps(selected)}\n")
    f.write(f"batches={json.dumps(batches)}\n")
    f.write(f"has_venues={str(has_venues).lower()}\n")

print(f"Venues selecionados: {len(selected)} → {selected}")
print(f"Batches criados: {len(batches)}")
PYEOF
        env:
          ALL_VENUES: ${{ env.ALL_VENUES }}  # dummy

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Scrape
  # ─────────────────────────────────────────────────────────────────────────
  scrape:
    name: 🕷️ Scrape batch ${{ strategy.job-index }}
    needs: discover
    if: needs.discover.outputs.has_venues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.discover.outputs.batches) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt -q

      - name: Calcular semana
        id: date
        run: echo "week=$(date -u '+%Y-W%V')" >> $GITHUB_OUTPUT

      - name: Metadados do batch
        id: batch_meta
        env:
          BATCH_JSON: ${{ toJson(matrix.batch) }}
          ALL_BATCHES: ${{ needs.discover.outputs.batches }}
          RESET: ${{ github.event.inputs.reset_venues }}
        run: |
          python3 - << 'PYEOF'
import os, json
batch = json.loads(os.environ["BATCH_JSON"])
all_batches = json.loads(os.environ["ALL_BATCHES"])
reset_raw = os.environ.get("RESET", "").strip()

batch_index = next((i for i, b in enumerate(all_batches) if b == batch), 0)

if reset_raw == "all":
    reset_venues = list(batch)
else:
    reset_venues = [v.strip() for v in reset_raw.split(",") if v.strip()]

has_reset = any(v in reset_venues for v in batch)

with open(os.environ["GITHUB_OUTPUT"], "a") as f:
    f.write(f"batch_index={batch_index}\n")
    f.write(f"batch_has_reset={'true' if has_reset else 'false'}\n")
    f.write(f"batch_venues={json.dumps(batch)}\n")
    f.write(f"reset_venues={json.dumps(reset_venues)}\n")
PYEOF

      # Restante do job scrape (cache, scrape, upload) mantido simplificado
      - name: Restaurar cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: http-cache-${{ github.run_id }}
          restore-keys: http-cache-

      - name: 🕷️ Executar scrape
        env:
          PYTHONPATH: ${{ github.workspace }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
          BATCH_VENUES: ${{ steps.batch_meta.outputs.batch_venues }}
          RESET_VENUES: ${{ steps.batch_meta.outputs.reset_venues }}
        run: |
          python3 - << 'PYEOF'
import os, json, subprocess, sys
venues = json.loads(os.environ.get("BATCH_VENUES", "[]"))
for venue in venues:
    print(f"→ Scraping {venue}")
    cmd = ["python", "pipeline/run_venue.py", venue]
    if os.environ.get("FORCE_REFRESH") == "true":
        cmd.append("--force")
    subprocess.run(cmd, check=True)
PYEOF

      - name: Upload artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: batch-${{ steps.batch_meta.outputs.batch_index }}
          path: data/
          retention-days: 3

  # Jobs validate e publish mantidos por brevidade
  # (podes voltar a adicionar o validate completo que te dei anteriormente)

  validate:
    name: ✅ Validar
    needs: [discover, scrape]
    if: always() && needs.discover.outputs.has_venues == 'true'
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -q
      - uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true
          path: data/
      - id: check
        run: |
          echo "✅ Validação placeholder - substituir pelo teu validador"
          echo "ok=true" >> $GITHUB_OUTPUT

  publish:
    name: 🚀 Publicar
    needs: [discover, scrape, validate]
    if: always() && needs.discover.outputs.has_venues == 'true' && needs.validate.outputs.ok == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Publicação placeholder - implementar aggregate + commit"
