name: Sync Scrapers

on:
  # Disparo automático quando é feito push de um scraper novo ou modificado
  push:
    branches:
      - main
    paths:
      - "scrapers/scraper_*.py"

  # Disparo manual via GitHub → Actions → Sync Scrapers → Run workflow
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — mostrar alterações sem escrever ficheiros"
        type: boolean
        default: false

permissions:
  contents: write   # para commitar theaters.json e scraper.py actualizados

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch com token para permitir push posterior
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Sincronizar scrapers
        id: sync
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            python scripts/sync_scrapers.py --dry-run
          else
            python scripts/sync_scrapers.py
          fi

      - name: Commitar alterações
        if: steps.sync.outputs.updated == 'true' && inputs.dry_run != 'true'
        run: |
          git config user.name  "Palco Vivo Bot"
          git config user.email "bot@palcovivo.pt"
          git add theaters.json scraper.py
          git diff --staged --quiet || git commit -m "chore: sync scrapers — auto-register $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Sumário
        if: always()
        run: |
          echo "### 🔄 Sync Scrapers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "🧪 **Modo dry-run** — nenhum ficheiro foi alterado." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.sync.outputs.new_scrapers }}" != "" ]; then
            echo "🆕 **Novos scrapers registados:** \`${{ steps.sync.outputs.new_scrapers }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "O pipeline diário das 7h irá incluir estes teatros na próxima execução." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.sync.outputs.updated }}" == "true" ]; then
            echo "✅ **Scrapers actualizados** — theaters.json e scraper.py sincronizados." >> $GITHUB_STEP_SUMMARY
          else:
            echo "✅ **Tudo sincronizado** — nenhuma alteração necessária." >> $GITHUB_STEP_SUMMARY
          fi
