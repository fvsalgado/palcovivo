<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Agenda — Palco Vivo</title>
<meta name="description" content="Calendário completo de teatro em Portugal — Palco Vivo."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a73e8;--blue-light:#e8f0fe;--blue-dark:#1557b0;
  --bg:#fff;--sidebar:#f6f8fc;--border:#dadce0;
  --text:#202124;--text2:#5f6368;--text3:#70757a;
  --hover:#f1f3f4;--radius:8px;
  --shadow:0 1px 3px rgba(60,64,67,.3),0 4px 8px rgba(60,64,67,.15);
  --ff:'Roboto',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--ff);font-size:13px;color:var(--text);background:var(--bg);display:flex;flex-direction:column}

/* TOPBAR */
.topbar{height:64px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.menu-btn{width:40px;height:40px;border:none;background:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:20px}
.menu-btn:hover{background:var(--hover)}
.brand{display:flex;align-items:center;gap:6px;text-decoration:none;margin-right:8px}
.brand-icon{font-size:26px}
.brand-name{font-size:20px;font-weight:300;color:var(--text)}
.brand-name b{font-weight:500;color:var(--blue)}
.spacer{flex:1}
.today-btn{height:36px;padding:0 16px;border:1px solid var(--border);background:var(--bg);border-radius:4px;font-family:var(--ff);font-size:14px;cursor:pointer;color:var(--text)}
.today-btn:hover{background:var(--hover)}
.nav-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:22px}
.nav-btn:hover{background:var(--hover)}
.period-label{font-size:20px;font-weight:400;color:var(--text);min-width:180px}
.view-tabs{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-left:8px}
.view-tab{padding:0 14px;height:36px;border:none;border-left:1px solid var(--border);background:var(--bg);font-family:var(--ff);font-size:14px;color:var(--text2);cursor:pointer}
.view-tab:first-child{border-left:none}
.view-tab:hover{background:var(--hover)}
.view-tab.active{background:var(--blue-light);color:var(--blue);font-weight:500}

/* APP */
.app{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:256px;min-width:256px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;flex-shrink:0}
.sidebar.hidden{display:none}
.mini-cal{padding:8px 12px 12px}
.mini-head{display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px}
.mini-label{font-size:11px;font-weight:500;color:var(--text)}
.mini-nav{display:flex}
.mini-btn{width:24px;height:24px;border:none;background:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2)}
.mini-btn:hover{background:var(--hover)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mini-dow{text-align:center;font-size:10px;color:var(--text3);padding:2px 0;font-weight:500}
.mini-day{text-align:center;font-size:11px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:1px auto;border-radius:50%;cursor:pointer;position:relative}
.mini-day:hover{background:var(--hover)}
.mini-day.today{background:var(--blue);color:#fff;font-weight:700}
.mini-day.other{color:var(--text3)}
.mini-day.has-ev::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);position:absolute;bottom:1px;left:50%;transform:translateX(-50%)}
.mini-day.today.has-ev::after{background:#fff}
.sb-section{padding:8px 16px}
.sb-title{font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);padding:8px 0 4px}
.tf{display:flex;align-items:center;gap:8px;padding:5px 4px;border-radius:4px;cursor:pointer;font-size:13px}
.tf:hover{background:var(--hover)}
.tf input{width:14px;height:14px;cursor:pointer;accent-color:var(--blue)}
.tf-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tf-cnt{margin-left:auto;font-size:11px;color:var(--text3)}
.sb-stats{padding:8px 16px;border-top:1px solid var(--border);margin-top:8px;font-size:12px;color:var(--text2);line-height:1.8}

/* CALENDÁRIO */
.cal-main{flex:1;overflow:auto;display:flex;flex-direction:column}
.cal-head{display:grid;flex-shrink:0;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
.ch-cell{text-align:center;padding:8px 4px;border-left:1px solid var(--border)}
.ch-cell:first-child{border-left:none}
.ch-dow{font-size:11px;font-weight:500;letter-spacing:.8px;color:var(--text3);text-transform:uppercase;display:block}
.ch-num{font-size:24px;font-weight:300;color:var(--text);display:block;line-height:1.2}
.ch-cell.col-today .ch-num{background:var(--blue);color:#fff;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:20px;font-weight:500}
.cal-body{flex:1}
.cal-week{display:grid;min-height:120px;border-bottom:1px solid var(--border)}
.cal-cell{border-left:1px solid var(--border);padding:4px 2px;overflow:hidden;vertical-align:top}
.cal-cell:first-child{border-left:none}
.cell-num{font-size:12px;color:var(--text2);padding:2px 4px;margin-bottom:2px;display:block}
.cal-cell.cell-today .cell-num{background:var(--blue);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:500}
.cal-cell.cell-other{background:#fafafa}
.cal-cell.cell-other .cell-num{color:var(--text3)}
.cell-ev{font-size:11px;padding:1px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:500;line-height:1.6}
.cell-ev:hover{filter:brightness(.88)}
.cell-more{font-size:11px;color:var(--blue);padding:1px 4px;cursor:pointer}

/* AGENDA */
.agenda-wrap{padding:8px 24px 60px}
.ag-day{margin-bottom:8px}
.ag-day-head{display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:2px}
.ag-num{font-size:24px;font-weight:300;width:40px;text-align:center;flex-shrink:0}
.ag-num.today{background:var(--blue);color:#fff;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500}
.ag-dow{font-size:12px;color:var(--text2);font-weight:500}
.ag-dow.today{color:var(--blue)}
.ag-month{font-size:11px;color:var(--text3)}
.ag-ev{display:flex;align-items:flex-start;gap:10px;padding:8px 8px 8px 52px;border-radius:4px;cursor:pointer}
.ag-ev:hover{background:var(--hover)}
.ag-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.ag-ev-title{font-size:14px;font-weight:500;color:var(--text)}
.ag-ev-sub{font-size:12px;color:var(--text2);margin-top:1px}
.ag-ev-dates{font-size:11px;color:var(--text3);margin-top:2px}
.no-events{padding:48px;text-align:center;color:var(--text2);font-size:14px}

/* POPUP */
.popup-backdrop{position:fixed;inset:0;z-index:400}
.popup{position:fixed;z-index:500;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);width:360px;overflow:hidden;animation:popIn .15s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.popup-hero{height:180px;background-size:cover;background-position:center;display:flex;align-items:flex-start;justify-content:flex-end;padding:8px}
.popup-close-btn{width:32px;height:32px;border:none;background:rgba(0,0,0,.35);color:#fff;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.popup-close-btn:hover{background:rgba(0,0,0,.5)}
.popup-body{padding:16px 20px 20px}
.popup-theater-label{font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.popup-title{font-size:18px;font-weight:400;color:var(--text);line-height:1.3;margin-bottom:12px}
.popup-row{display:flex;gap:10px;font-size:13px;color:var(--text2);margin-bottom:8px;align-items:flex-start}
.popup-icon{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.popup-desc{font-size:13px;color:var(--text2);line-height:1.6;border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.popup-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn-p{padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:4px;font-family:var(--ff);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}
.btn-p:hover{background:var(--blue-dark)}
.btn-s{padding:8px 16px;background:var(--bg);color:var(--blue);border:1px solid var(--border);border-radius:4px;font-family:var(--ff);font-size:13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}
.btn-s:hover{background:var(--blue-light)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){.sidebar{display:none!important}.view-tabs{display:none}.period-label{font-size:15px}}

/* ===== PALCO VIVO NAV ===== */
:root{--pv-red:#B91C1C;--pv-gold:#C9963A;--pv-dark:#0D0A07;--pv-dark-border:rgba(201,150,58,.2);--pv-ff-d:'Playfair Display',Georgia,serif;--pv-ff-b:'Plus Jakarta Sans',system-ui,sans-serif}
.pv-topnav{position:fixed;top:0;left:0;right:0;z-index:300;height:60px;padding:0 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(13,10,7,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--pv-dark-border)}
.pv-nb{display:flex;align-items:center;gap:10px;text-decoration:none}
.pv-nbm{width:32px;height:32px;background:var(--pv-red);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--pv-ff-d);font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.pv-nbt{font-family:var(--pv-ff-d);font-size:18px;font-weight:700;color:#F0E8DC;letter-spacing:-.01em}
.pv-nbt em{font-style:italic;color:var(--pv-red)}
.pv-nl{display:flex;align-items:center;gap:2px;list-style:none}
.pv-nl a{display:block;padding:6px 13px;font-family:var(--pv-ff-b);font-size:13px;font-weight:500;color:#A89880;text-decoration:none;border-radius:4px;transition:color .2s,background .2s}
.pv-nl a:hover,.pv-nl a.active{color:var(--pv-gold);background:rgba(201,150,58,.1)}
.pv-nl a:focus-visible{outline:2px solid var(--pv-gold);outline-offset:2px}
.pv-nt{display:none;background:none;border:none;cursor:pointer;font-size:22px;padding:8px;color:#A89880}
@media(max-width:768px){.pv-topnav{padding:0 16px}.pv-nt{display:flex}.pv-nl{display:none}.pv-nl.open{display:flex;flex-direction:column;position:fixed;top:60px;left:0;right:0;padding:12px;background:var(--pv-dark);border-bottom:1px solid var(--pv-dark-border);gap:2px}.pv-nl.open a{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05)}}
/* push content below new nav */
.topbar{top:60px}
html,body{overflow:visible!important}
.app{margin-top:124px}

</style>

<script>
const THEATER_COLORS={
  "Teatro Variedades & Capitólio":"#d93025",
  "São Luiz Teatro Municipal":"#1a73e8",
  "Teatro Nacional São João":"#188038",
  "Teatro Nacional D. Maria II":"#f9ab00",
  "Teatro Tivoli BBVA":"#7b1fa2",
  "Teatro Maria Matos":"#e65100",
  "CCB — Centro Cultural de Belém":"#00695c",
};
const THEATER_SHORT={
  "Teatro Variedades & Capitólio":"Variedades",
  "São Luiz Teatro Municipal":"São Luiz",
  "Teatro Nacional São João":"TNSJ",
  "Teatro Nacional D. Maria II":"D. Maria II",
  "Teatro Tivoli BBVA":"Tivoli",
  "Teatro Maria Matos":"Maria Matos",
  "CCB — Centro Cultural de Belém":"CCB",
};
function tColor(t){for(const[k,v]of Object.entries(THEATER_COLORS))if(t&&t.startsWith(k))return v;return"#757575";}
function tShort(t){for(const[k,v]of Object.entries(THEATER_SHORT))if(t&&t.startsWith(k))return v;return t||"";}

const PTD=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const PTDs=["D","S","T","Q","Q","S","S"];
const PTM=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

let ALL=[],view="mes",cursor=new Date();
let miniY,miniM,activeT=new Set();
const today=new Date();today.setHours(0,0,0,0);
cursor=new Date(today);miniY=today.getFullYear();miniM=today.getMonth();

async function init(){
  try{
    const r=await fetch("events.json?t="+Date.now());
    if(!r.ok)throw new Error();
    const data=await r.json();
    ALL=(data.events||[]).map(e=>({...e,
      _s:e.date_start?new Date(e.date_start+"T00:00:00"):null,
      _e:e.date_end?new Date(e.date_end+"T00:00:00"):null
    })).filter(e=>e._s);
    const theaters=[...new Set(ALL.map(e=>e.theater))].sort();
    activeT=new Set(theaters);
    const cnt=data.by_theater||{};
    const tf=document.getElementById("tf-list");
    tf.innerHTML="";
    theaters.forEach(t=>{
      const c=tColor(t),s=tShort(t),n=cnt[t]||"";
      tf.innerHTML+=`<label class="tf"><input type="checkbox" checked onchange="toggleT('${t.replace(/'/g,"\\'")}',this.checked)"/><span class="tf-dot" style="background:${c}"></span><span>${s}</span><span class="tf-cnt">${n}</span></label>`;
    });
    const upd=data.updated_at?new Date(data.updated_at):null;
    document.getElementById("sb-stats").innerHTML=
      `<b>${data.total||ALL.length}</b> espectáculos<br>`+
      (upd?`Actualizado ${upd.toLocaleDateString("pt",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}`:"");
    buildMini();render();
  }catch(e){
    document.getElementById("loading").innerHTML=
      `<div style="text-align:center;padding:40px;color:#5f6368"><div style="font-size:48px;margin-bottom:12px">🎭</div><div style="font-size:16px;margin-bottom:8px">Sem eventos ainda</div><div style="font-size:13px">O ficheiro events.json é gerado pelo GitHub Actions.<br>Vai a Actions → "Run workflow" para correr o scraping.</div></div>`;
  }
}

function toggleT(t,on){on?activeT.add(t):activeT.delete(t);buildMini();render();}
function vis(){return ALL.filter(e=>activeT.has(e.theater));}

function buildMini(){
  document.getElementById("mini-label").textContent=PTM[miniM].slice(0,3)+" "+miniY;
  const g=document.getElementById("mini-grid");g.innerHTML="";
  PTDs.forEach(d=>{const c=document.createElement("div");c.className="mini-dow";c.textContent=d;g.appendChild(c);});
  const first=new Date(miniY,miniM,1).getDay();
  const dim=new Date(miniY,miniM+1,0).getDate();
  const dimP=new Date(miniY,miniM,0).getDate();
  const evD=new Set(vis().flatMap(e=>{
    if(!e._s)return[];
    const end=e._e||e._s,days=[];
    for(let d=new Date(e._s);d<=end;d.setDate(d.getDate()+1))
      if(d.getFullYear()===miniY&&d.getMonth()===miniM)days.push(d.getDate());
    return days;
  }));
  for(let i=first-1;i>=0;i--){const c=document.createElement("div");c.className="mini-day other";c.textContent=dimP-i;g.appendChild(c);}
  for(let d=1;d<=dim;d++){
    const dt=new Date(miniY,miniM,d);
    const c=document.createElement("div");
    let cls="mini-day";
    if(dt.toDateString()===today.toDateString())cls+=" today";
    else if(dt<today)cls+=" other";
    if(evD.has(d))cls+=" has-ev";
    c.className=cls;c.textContent=d;
    c.onclick=()=>{cursor=new Date(dt);render();};
    g.appendChild(c);
  }
  const rem=(first+dim)%7?7-(first+dim)%7:0;
  for(let d=1;d<=rem;d++){const c=document.createElement("div");c.className="mini-day other";c.textContent=d;g.appendChild(c);}
}
function miniNav(dir){miniM+=dir;if(miniM>11){miniM=0;miniY++;}if(miniM<0){miniM=11;miniY--;}buildMini();}

function goToday(){cursor=new Date(today);buildMini();render();}
function nav(dir){
  const d=new Date(cursor);
  if(view==="dia")d.setDate(d.getDate()+dir);
  else if(view==="semana")d.setDate(d.getDate()+dir*7);
  else if(view==="mes")d.setMonth(d.getMonth()+dir);
  else d.setDate(d.getDate()+dir*14);
  cursor=d;render();
}
function setView(v,btn){
  view=v;
  document.querySelectorAll(".view-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");render();
}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("hidden");}

function render(){
  updateLabel();buildMini();
  const main=document.getElementById("cal-main");
  const evs=vis();
  if(view==="agenda")return renderAgenda(main,evs);
  if(view==="mes")return renderMonth(main,evs);
  renderWeek(main,evs,view==="dia"?1:7);
}

function updateLabel(){
  const c=cursor;let s="";
  if(view==="dia")s=`${c.getDate()} de ${PTM[c.getMonth()]} de ${c.getFullYear()}`;
  else if(view==="semana"){
    const mo=wStart(c),su=new Date(mo);su.setDate(su.getDate()+6);
    s=mo.getMonth()===su.getMonth()?`${PTM[mo.getMonth()]} ${mo.getFullYear()}`:
      `${PTM[mo.getMonth()].slice(0,3)} – ${PTM[su.getMonth()].slice(0,3)} ${su.getFullYear()}`;
  }else if(view==="mes")s=`${PTM[c.getMonth()]} ${c.getFullYear()}`;
  else s=`${c.getDate()} ${PTM[c.getMonth()].slice(0,3)} ${c.getFullYear()}`;
  document.getElementById("period-label").textContent=s;
}

function onDay(evs,dt){
  return evs.filter(e=>{if(!e._s)return false;const end=e._e||e._s;return e._s<=dt&&dt<=end;});
}

function wStart(d){
  const dt=new Date(d);dt.setHours(0,0,0,0);
  const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return dt;
}

function renderWeek(main,evs,days){
  const start=days===1?new Date(cursor):wStart(cursor);start.setHours(0,0,0,0);
  const cols=`repeat(${days},1fr)`;
  let h=`<div class="cal-head" style="grid-template-columns:${cols}">`;
  for(let d=0;d<days;d++){
    const dt=new Date(start);dt.setDate(dt.getDate()+d);
    const isT=dt.toDateString()===today.toDateString();
    h+=`<div class="ch-cell${isT?" col-today":""}"><span class="ch-dow">${PTDs[dt.getDay()]}</span><span class="ch-num">${dt.getDate()}</span></div>`;
  }
  h+=`</div><div class="cal-body"><div class="cal-week" style="grid-template-columns:${cols}">`;
  for(let d=0;d<days;d++){
    const dt=new Date(start);dt.setDate(dt.getDate()+d);
    const isT=dt.toDateString()===today.toDateString();
    const de=onDay(evs,dt);
    h+=`<div class="cal-cell${isT?" cell-today":""}${dt<today&&!isT?" cell-other":""}"><span class="cell-num">${dt.getDate()}</span>`;
    const MAX=5;
    de.slice(0,MAX).forEach(ev=>{const idx=ALL.indexOf(ev);h+=`<div class="cell-ev" style="background:${tColor(ev.theater)}" onclick="openPopup(${idx},event)">${esc(ev.title)}</div>`;});
    if(de.length>MAX)h+=`<div class="cell-more">+${de.length-MAX} mais</div>`;
    h+=`</div>`;
  }
  h+=`</div></div>`;main.innerHTML=h;
}

function renderMonth(main,evs){
  const y=cursor.getFullYear(),m=cursor.getMonth();
  const first=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const dimP=new Date(y,m,0).getDate();
  const sd=first===0?6:first-1;
  let h=`<div class="cal-head" style="grid-template-columns:repeat(7,1fr)">`;
  ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"].forEach(d=>h+=`<div class="ch-cell"><span class="ch-dow">${d}</span></div>`);
  h+=`</div><div class="cal-body"><div class="cal-week" style="grid-template-columns:repeat(7,1fr);height:100%">`;
  for(let i=sd-1;i>=0;i--)h+=`<div class="cal-cell cell-other"><span class="cell-num">${dimP-i}</span></div>`;
  for(let d=1;d<=dim;d++){
    const dt=new Date(y,m,d);const isT=dt.toDateString()===today.toDateString();
    const de=onDay(evs,dt);const MAX=3;
    h+=`<div class="cal-cell${isT?" cell-today":""}${dt<today&&!isT?" cell-other":""}"><span class="cell-num">${d}</span>`;
    de.slice(0,MAX).forEach(ev=>{const idx=ALL.indexOf(ev);h+=`<div class="cell-ev" style="background:${tColor(ev.theater)}" onclick="openPopup(${idx},event)">${esc(ev.title)}</div>`;});
    if(de.length>MAX)h+=`<div class="cell-more">+${de.length-MAX}</div>`;
    h+=`</div>`;
  }
  const rem=(sd+dim)%7?7-(sd+dim)%7:0;
  for(let d=1;d<=rem;d++)h+=`<div class="cal-cell cell-other"><span class="cell-num">${d}</span></div>`;
  h+=`</div></div>`;main.innerHTML=h;
}

function renderAgenda(main,evs){
  const start=new Date(cursor);start.setHours(0,0,0,0);
  const limit=new Date(start);limit.setDate(limit.getDate()+180);
  const dm={};
  evs.forEach(e=>{
    if(!e._s)return;
    const end=e._e&&e._e>=start?e._e:e._s;
    for(let d=new Date(Math.max(e._s,start));d<=end&&d<=limit;d.setDate(d.getDate()+1)){
      const k=d.toDateString();(dm[k]=dm[k]||[]).push(e);
    }
  });
  const days=Object.keys(dm).sort((a,b)=>new Date(a)-new Date(b));
  if(!days.length){main.innerHTML=`<div class="no-events">Nenhum espectáculo encontrado.</div>`;return;}
  let h=`<div class="agenda-wrap">`;
  days.forEach(k=>{
    const dt=new Date(k);
    const isT=dt.toDateString()===today.toDateString();
    const isTom=dt.toDateString()===new Date(today.getTime()+86400000).toDateString();
    let dow=PTD[dt.getDay()];
    if(isT)dow="Hoje";if(isTom)dow="Amanhã";
    h+=`<div class="ag-day"><div class="ag-day-head">
      <div class="ag-num${isT?" today":""}">${dt.getDate()}</div>
      <div><div class="ag-dow${isT?" today":""}">${dow}</div><div class="ag-month">${PTM[dt.getMonth()]} ${dt.getFullYear()}</div></div>
    </div>`;
    (dm[k]||[]).forEach(ev=>{
      const idx=ALL.indexOf(ev);
      h+=`<div class="ag-ev" onclick="openPopup(${idx},event)">
        <div class="ag-dot" style="background:${tColor(ev.theater)}"></div>
        <div>
          <div class="ag-ev-title">${esc(ev.title)}</div>
          <div class="ag-ev-sub">${esc(tShort(ev.theater))}${ev.category?" · "+esc(ev.category):""}</div>
          ${ev.dates_label?`<div class="ag-ev-dates">${esc(ev.dates_label)}</div>`:""}
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;main.innerHTML=h;
}

function openPopup(idx,evt){
  evt.stopPropagation();
  const e=ALL[idx];if(!e)return;
  const col=tColor(e.theater);
  const hero=document.getElementById("p-hero");
  if(e.image){hero.style.backgroundImage=`url('${e.image}')`;hero.style.backgroundColor=col;}
  else{hero.style.backgroundImage="none";hero.style.backgroundColor=col;}
  document.getElementById("p-theater").textContent=e.theater||"";
  document.getElementById("p-theater").style.color=col;
  document.getElementById("p-title").textContent=e.title;
  document.getElementById("p-dates").textContent=e.dates_label||(e.date_start||"");
  const sr=(id,rowId,v)=>{const r=document.getElementById(rowId);if(v){document.getElementById(id).textContent=v;r.style.display="flex";}else r.style.display="none";};
  sr("p-sched","p-sched-row",e.schedule);
  sr("p-price","p-price-row",e.price);
  sr("p-dur","p-dur-row",e.duration);
  const desc=document.getElementById("p-desc");
  if(e.description){desc.textContent=e.description;desc.style.display="block";}else desc.style.display="none";
  const ac=document.getElementById("p-actions");ac.innerHTML="";
  if(e.ticket_url)ac.innerHTML+=`<a class="btn-p" href="${e.ticket_url}" target="_blank" rel="noopener">Comprar bilhetes</a>`;
  if(e.url&&e.url!==e.ticket_url)ac.innerHTML+=`<a class="btn-s" href="${e.url}" target="_blank" rel="noopener">Mais info</a>`;
  const popup=document.getElementById("popup");popup.style.display="block";
  document.getElementById("pb").style.display="block";
  const x=Math.min(evt.clientX+12,window.innerWidth-380);
  const y=Math.min(evt.clientY-20,window.innerHeight-520);
  popup.style.left=Math.max(8,x)+"px";popup.style.top=Math.max(8,y)+"px";
}
function closePopup(){document.getElementById("popup").style.display="none";document.getElementById("pb").style.display="none";}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePopup();});
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
init();

function pvToggle(btn){const m=document.getElementById("pv-nav-menu");const o=m.classList.toggle("open");btn.setAttribute("aria-expanded",o);btn.setAttribute("aria-label",o?"Fechar menu":"Abrir menu");btn.textContent=o?"✕":"☰"}

</script>
